<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админ-панель</title>
    <style>
        body { font-family: Arial; background: #1a1a2e; color: white; padding: 20px; }
        table { width: 100%; background: #16213e; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #0f3460; text-align: left; }
        th { background: #0f3460; }
        button { background: #e94560; border: none; color: white; padding: 5px 10px; margin: 2px; border-radius: 5px; cursor: pointer; }
        .unban { background: #00ff88; color: black; }
    </style>
</head>
<body>
    <h1>👑 Админ-панель</h1>
    <button onclick="loadUsers()">🔄 Обновить</button>
    <div style="overflow-x: auto;">
        <table>
            <thead><tr><th>ID</th><th>Логин</th><th>Ник</th><th>Монет</th><th>Ящиков</th><th>Статус</th><th>Действия</th></tr></thead>
            <tbody id="usersList"><tr><td colspan="7">Загрузка...</td></tr></tbody>
        </table>
    </div>
    <script>
        async function loadUsers() {
            const res = await fetch('/api/users');
            const users = await res.json();
            const tbody = document.getElementById('usersList');
            tbody.innerHTML = '';
            for (const u of users) {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = u.id;
                row.insertCell(1).innerText = u.login;
                row.insertCell(2).innerText = u.nickname;
                row.insertCell(3).innerText = u.coins;
                row.insertCell(4).innerText = u.total_boxes;
                row.insertCell(5).innerHTML = u.is_banned ? '⛔ Забанен' : '✅ Активен';
                const actions = row.insertCell(6);
                if (u.is_banned) {
                    const btn = document.createElement('button');
                    btn.innerText = 'Разбанить';
                    btn.className = 'unban';
                    btn.onclick = () => fetch('/api/unban', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({userId: u.id}) }).then(() => loadUsers());
                    actions.appendChild(btn);
                } else if (u.login !== 'unity') {
                    const btn = document.createElement('button');
                    btn.innerText = 'Забанить';
                    btn.onclick = () => {
                        const reason = prompt('Причина:');
                        if(reason) {
                            const hours = prompt('Часы (0=навсегда):');
                            fetch('/api/ban', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({userId: u.id, reason, hours: parseInt(hours)||0}) }).then(() => loadUsers());
                        }
                    };
                    actions.appendChild(btn);
                }
            }
        }
        loadUsers();
        setInterval(loadUsers, 10000);
    </script>
</body>
</html>
