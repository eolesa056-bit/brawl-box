<!DOCTYPE html>
<html>
<head>
    <title>Brawl Box Simulator</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #1a1a2e;
            color: white;
            padding: 20px;
        }
        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            margin: 10px;
            border-radius: 10px;
            cursor: pointer;
        }
        input {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: none;
            width: 200px;
        }
        #authBox, #gameBox {
            background: #16213e;
            padding: 20px;
            border-radius: 20px;
            max-width: 400px;
            margin: 20px auto;
        }
        .reward {
            font-size: 24px;
            margin: 10px 0;
            color: #f9a826;
        }
        .admin-panel {
            background: #0f3460;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .admin-panel h3 {
            margin: 0 0 10px 0;
            color: #e94560;
        }
        .admin-btn {
            background: #e94560;
            padding: 8px 15px;
            font-size: 14px;
        }
        table {
            width: 100%;
            background: #16213e;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 12px;
        }
        th, td {
            padding: 5px;
            border-bottom: 1px solid #0f3460;
            text-align: left;
        }
        th {
            background: #0f3460;
        }
        .ban-btn {
            background: #e94560;
            padding: 3px 8px;
            font-size: 11px;
        }
        .unban-btn {
            background: #00ff88;
            color: black;
            padding: 3px 8px;
            font-size: 11px;
        }
        .admin-table {
            max-height: 300px;
            overflow-y: auto;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>🎁 Brawl Box Simulator</h1>
    
    <div id="authBox">
        <h2>🔐 Вход / Регистрация</h2>
        <input type="text" id="login" placeholder="Логин"><br>
        <input type="password" id="password" placeholder="Пароль"><br>
        <input type="text" id="nickname" placeholder="Ник (для регистрации)"><br>
        <button onclick="register()">📝 Регистрация</button>
        <button onclick="login()">🔓 Вход</button>
        <div id="authMessage"></div>
    </div>
    
    <div id="gameBox" style="display:none">
        <!-- Админ-панель (видна только админу) -->
        <div id="adminPanel" style="display:none" class="admin-panel">
            <h3>👑 АДМИН-ПАНЕЛЬ</h3>
            <button onclick="toggleAdminTable()" class="admin-btn">📋 Управление игроками</button>
            <div id="adminTableContainer" style="display:none;"></div>
        </div>
        
        <h2>📦 Ящик</h2>
        <button id="openBtn">🔓 ОТКРЫТЬ ЯЩИК</button>
        <div id="reward" class="reward"></div>
        <div id="stats">
            <p>💰 Монет: <span id="coins">0</span></p>
            <p>🎁 Открыто ящиков: <span id="boxes">0</span></p>
            <p>👤 Игрок: <span id="nicknameDisplay"></span></p>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentUserId = null;
        let isAdmin = false;
        
        async function register() {
            const login = document.getElementById('login').value;
            const password = document.getElementById('password').value;
            const nickname = document.getElementById('nickname').value;
            if (!login || !password || !nickname) {
                alert('Заполни все поля');
                return;
            }
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({login, password, nickname})
            });
            const data = await res.json();
            if (data.success) {
                alert('Регистрация успешна! Теперь войди.');
            } else {
                document.getElementById('authMessage').innerText = data.message;
            }
        }
        
        async function login() {
            const login = document.getElementById('login').value;
            const password = document.getElementById('password').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({login, password})
            });
            const data = await res.json();
            if (data.success) {
                currentUserId = data.user.id;
                isAdmin = data.user.is_admin === 1;
                document.getElementById('nicknameDisplay').innerText = data.user.nickname;
                document.getElementById('authBox').style.display = 'none';
                document.getElementById('gameBox').style.display = 'block';
                if (isAdmin) {
                    document.getElementById('adminPanel').style.display = 'block';
                }
                socket.emit('auth', currentUserId, (resp) => {
                    if (!resp.success) alert('Ошибка подключения');
                });
                updateStats();
            } else {
                document.getElementById('authMessage').innerText = data.message;
            }
        }
        
        async function updateStats() {
            if (!currentUserId) return;
            const res = await fetch('/api/user/' + currentUserId);
            const data = await res.json();
            if (!data.error) {
                document.getElementById('coins').innerText = data.coins;
                document.getElementById('boxes').innerText = data.total_boxes;
            }
        }
        
        async function toggleAdminTable() {
            const container = document.getElementById('adminTableContainer');
            if (container.style.display === 'none') {
                await loadAdminTable();
                container.style.display = 'block';
            } else {
                container.style.display = 'none';
            }
        }
        
        async function loadAdminTable() {
            const res = await fetch('/api/users');
            const users = await res.json();
            const container = document.getElementById('adminTableContainer');
            
            let html = '<table><thead><tr><th>ID</th><th>Логин</th><th>Ник</th><th>Монет</th><th>Ящиков</th><th>Статус</th><th>Действия</th></tr></thead><tbody>';
            
            for (const u of users) {
                html += `<tr>
                    <td>${u.id}</td>
                    <td>${u.login}</td>
                    <td>${u.nickname}</td>
                    <td>${u.coins}</td>
                    <td>${u.total_boxes}</td>
                    <td>${u.is_banned ? '⛔ Забанен' : '✅ Активен'}</td>
                    <td>`;
                
                if (u.is_banned) {
                    html += `<button class="unban-btn" onclick="unbanUser(${u.id})">Разбанить</button>`;
                } else if (u.login !== 'unity') {
                    html += `<button class="ban-btn" onclick="banUser(${u.id})">Забанить</button>`;
                } else {
                    html += `—`;
                }
                html += `</td></tr>`;
            }
            html += '</tbody></table>';
            container.innerHTML = html;
        }
        
        async function banUser(userId) {
            const reason = prompt('Причина бана:');
            if (!reason) return;
            const hours = parseInt(prompt('Часы (0 = навсегда):')) || 0;
            await fetch('/api/ban', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({userId, reason, hours})
            });
            loadAdminTable();
        }
        
        async function unbanUser(userId) {
            await fetch('/api/unban', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({userId})
            });
            loadAdminTable();
        }
        
        document.getElementById('openBtn').onclick = () => {
            if (currentUserId) socket.emit('open_box');
        };
        
        socket.on('box_opened', (reward) => {
            document.getElementById('reward').innerHTML = `🎉 Выпало: ${reward.name}! 🎉`;
            updateStats();
        });
        
        socket.on('session_terminated', () => {
            alert("СЕССИЯ ЗАВЕРШЕНА. ПЕРЕЗАГРУЗИТЕ ИГРУ");
            window.location.reload();
        });
        
        setInterval(updateStats, 5000);
    </script>
</body>
</html>
