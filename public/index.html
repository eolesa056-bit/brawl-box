<!DOCTYPE html>
<html>
<head>
    <title>Brawl Stars Box Simulator</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(ellipse at 20% 30%, #0f0c29, #1a1a3e, #0a0a1a);
            min-height: 100vh;
            padding: 20px;
        }

        /* Плавающая аватарка (мини) */
        .floating-avatar {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            cursor: pointer;
        }

        .mini-avatar {
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #2a2a5a, #1a1a3e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            border: 2px solid #e94560;
            transition: 0.2s;
        }

        /* Модальное окно профиля */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }

        .profile-container {
            background: linear-gradient(145deg, #0f172a, #020617);
            width: 90%;
            max-width: 700px;
            border-radius: 50px;
            border: 1px solid #e94560;
            padding: 30px;
            position: relative;
            box-shadow: 0 0 40px rgba(233,69,96,0.3);
        }

        .close-profile {
            position: absolute;
            top: 20px;
            right: 25px;
            background: #e94560;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 22px;
            cursor: pointer;
        }

        /* Верхняя часть: аватарка (кликабельна для смены) */
        .profile-header {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            margin-bottom: 40px;
            align-items: center;
        }

        .avatar-large {
            width: 130px;
            height: 130px;
            background: linear-gradient(135deg, #2a2a5a, #1a1a3e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 85px;
            border: 3px solid #e94560;
            cursor: pointer;
            transition: 0.2s;
        }

        .avatar-large:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px #e94560;
        }

        .profile-info {
            flex: 1;
        }

        .profile-nickname {
            font-size: 36px;
            font-weight: bold;
            background: linear-gradient(135deg, #fff, #e94560);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .profile-tag {
            font-size: 14px;
            color: #aaa;
            margin: 5px 0;
        }

        .profile-cups {
            font-size: 24px;
            color: #f9a826;
            font-weight: bold;
            margin-top: 10px;
        }

        /* Сетка статистики */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 30px;
            padding: 20px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 18px;
            color: #aaa;
            margin-bottom: 15px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #f9a826;
        }

        /* Окно выбора аватарки */
        .avatar-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 300;
            justify-content: center;
            align-items: center;
        }

        .avatar-selector {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 550px;
            background: #0f172a;
            padding: 30px;
            border-radius: 50px;
            border: 1px solid #e94560;
        }

        .avatar-option {
            width: 80px;
            height: 80px;
            background: #1a1a3e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .avatar-option:hover {
            border-color: #e94560;
            transform: scale(1.05);
            box-shadow: 0 0 15px #e94560;
        }

        .hidden {
            display: none;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 50px;
            background: #0f172a;
            border: none;
            color: white;
            text-align: center;
            margin: 10px 0;
        }

        .btn {
            background: linear-gradient(135deg, #e94560, #b91c3c);
            padding: 10px 20px;
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- Мини-аватарка (показывает, кто зашёл) -->
    <div class="floating-avatar" onclick="openProfile()">
        <div class="mini-avatar" id="miniAvatar">🎮</div>
    </div>

    <!-- ОСНОВНОЕ ОКНО ПРОФИЛЯ -->
    <div id="profileModal" class="modal">
        <div class="profile-container">
            <button class="close-profile" onclick="closeProfile()">✖</button>
            
            <div class="profile-header">
                <!-- Большая аватарка (клик по ней → выбор новой) -->
                <div class="avatar-large" id="largeAvatar" onclick="openAvatarPicker()">🎮</div>
                <div class="profile-info">
                    <div class="profile-nickname" id="profileNick">-</div>
                    <div class="profile-tag" id="profileTag">#----</div>
                    <div class="profile-cups">🏆 <span id="profileCups">0</span> кубков</div>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <h3>🎲 ОТКРЫТО ЯЩИКОВ</h3>
                    <div class="stat-value" id="profileBoxes">0</div>
                </div>
                <div class="stat-card">
                    <h3>💰 МОНЕТЫ</h3>
                    <div class="stat-value" id="profileCoins">0</div>
                </div>
                <div class="stat-card">
                    <h3>🏆 КУБКОВ ВСЕГО</h3>
                    <div class="stat-value" id="profileTotalCups">0</div>
                </div>
                <div class="stat-card">
                    <h3>⭐ ЛУЧШИЙ РЕКОРД</h3>
                    <div class="stat-value" id="recordCups">0</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ОКНО ВЫБОРА АВАТАРКИ (появляется при клике на большую аватарку) -->
    <div id="avatarPickerModal" class="avatar-modal">
        <div class="avatar-selector">
            <div class="avatar-option" data-avatar="🎮">🎮</div>
            <div class="avatar-option" data-avatar="⭐">⭐</div>
            <div class="avatar-option" data-avatar="🔥">🔥</div>
            <div class="avatar-option" data-avatar="🐺">🐺</div>
            <div class="avatar-option" data-avatar="🤖">🤖</div>
            <div class="avatar-option" data-avatar="👑">👑</div>
            <div class="avatar-option" data-avatar="⚡">⚡</div>
            <div class="avatar-option" data-avatar="😈">😈</div>
        </div>
    </div>

    <!-- Окно входа (первое) -->
    <div id="authPanel" class="modal" style="display:flex; background:rgba(0,0,0,0.95);">
        <div class="profile-container" style="max-width:400px;">
            <h2 style="text-align:center;">🔐 ВХОД</h2>
            <input type="text" id="nickname" placeholder="Никнейм">
            <div id="adminPasswordGroup" class="hidden">
                <input type="password" id="adminPassword" placeholder="Пароль админа">
            </div>
            <button class="btn" style="width:100%" onclick="login()">ВОЙТИ</button>
            <div id="authMessage" style="color:#ff6b6b; text-align:center; margin-top:10px;"></div>
        </div>
    </div>

    <!-- Главное меню (пока пустое) -->
    <div id="gamePanel" class="hidden" style="max-width:600px; margin:100px auto 0; text-align:center;">
        <h1 style="font-size:42px; background:linear-gradient(135deg,#fff,#e94560); -webkit-background-clip:text; background-clip:text; color:transparent;">⚡ BRAWL BOX ⚡</h1>
        <div style="background:rgba(15,25,45,0.85); border-radius:32px; padding:40px; margin-top:20px;">
            <p style="color:#aaa;">Здесь скоро появится игровой автомат</p>
        </div>
    </div>

    <script>
        let currentPlayerId = null;

        // Загрузка данных профиля
        async function refreshProfileData() {
            if (!currentPlayerId) return;
            const res = await fetch('/api/player/' + currentPlayerId);
            const data = await res.json();
            if (!data.error) {
                const avatar = data.avatar || '🎮';
                document.getElementById('miniAvatar').innerText = avatar;
                document.getElementById('largeAvatar').innerText = avatar;
                document.getElementById('profileNick').innerText = data.nickname;
                document.getElementById('profileTag').innerText = data.tag || '#----';
                document.getElementById('profileCups').innerText = data.cups || 0;
                document.getElementById('profileBoxes').innerText = data.total_boxes || 0;
                document.getElementById('profileCoins').innerText = data.coins || 0;
                document.getElementById('profileTotalCups').innerText = data.cups || 0;
                document.getElementById('recordCups').innerText = data.record_cups || data.cups || 0;
            }
        }

        // Смена аватарки (вызывается при клике в галерее)
        async function changeAvatar(avatar) {
            await fetch('/api/change_avatar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ playerId: currentPlayerId, avatar: avatar })
            });
            await refreshProfileData();
            closeAvatarPicker(); // закрываем окно выбора аватарок
        }

        // Открытие / закрытие окон
        function openProfile() {
            refreshProfileData();
            document.getElementById('profileModal').style.display = 'flex';
        }

        function closeProfile() {
            document.getElementById('profileModal').style.display = 'none';
        }

        function openAvatarPicker() {
            document.getElementById('avatarPickerModal').style.display = 'flex';
        }

        function closeAvatarPicker() {
            document.getElementById('avatarPickerModal').style.display = 'none';
        }

        // Вход
        async function login() {
            const nickname = document.getElementById('nickname').value.trim();
            if (!nickname) return;
            let password = '';
            if (nickname === 'unity') {
                password = document.getElementById('adminPassword').value;
                if (!password) return alert('Введи пароль админа');
            }
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nickname, password })
            });
            const data = await res.json();
            if (data.success) {
                currentPlayerId = data.player.id;
                document.getElementById('authPanel').style.display = 'none';
                document.getElementById('gamePanel').classList.remove('hidden');
                await refreshProfileData();

                // Назначить обработчики для аватарок в галерее
                document.querySelectorAll('.avatar-option').forEach(opt => {
                    opt.onclick = () => changeAvatar(opt.getAttribute('data-avatar'));
                });
            } else {
                document.getElementById('authMessage').innerText = data.message;
            }
        }

        // Поле пароля для админа
        document.getElementById('nickname').addEventListener('input', function(e) {
            const adminGroup = document.getElementById('adminPasswordGroup');
            adminGroup.classList.toggle('hidden', e.target.value !== 'unity');
        });

        // Закрытие окон по клику на фон
        window.onclick = function(event) {
            const profile = document.getElementById('profileModal');
            const picker = document.getElementById('avatarPickerModal');
            if (event.target === profile) closeProfile();
            if (event.target === picker) closeAvatarPicker();
        };
    </script>
</body>
</html>
