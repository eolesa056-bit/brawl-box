<!DOCTYPE html>
<html>
<head>
    <title>Brawl Stars Box Simulator</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(ellipse at 20% 30%, #0f0c29, #1a1a3e, #0a0a1a);
            min-height: 100vh;
            padding: 20px;
        }

        /* Плавающая аватарка (левый верхний угол) */
        .floating-avatar {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            cursor: pointer;
            transition: 0.2s;
        }

        .avatar-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #2a2a5a, #1a1a3e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            border: 2px solid #e94560;
            box-shadow: 0 0 15px rgba(233,69,96,0.3);
            transition: 0.2s;
        }

        .avatar-icon:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px #e94560;
        }

        /* Модальное окно профиля */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: linear-gradient(145deg, #0f172a, #020617);
            width: 90%;
            max-width: 500px;
            max-height: 85vh;
            border-radius: 32px;
            border: 1px solid #e94560;
            box-shadow: 0 0 40px rgba(233,69,96,0.4);
            overflow-y: auto;
            position: relative;
            padding: 20px;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            background: #e94560;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .close-modal:hover {
            transform: scale(1.1);
            background: #ff6b8b;
        }

        /* Заголовок */
        .game-title {
            text-align: center;
            margin-bottom: 30px;
            margin-top: 10px;
        }

        .game-title h1 {
            font-size: 42px;
            background: linear-gradient(135deg, #fff, #e94560);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Стили панелей */
        .glass-panel {
            background: rgba(15, 25, 45, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(233, 69, 96, 0.4);
            padding: 20px;
            margin-bottom: 20px;
        }

        /* Аватарки в профиле */
        .avatar-selector {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin: 20px 0;
            justify-content: center;
        }

        .avatar-option {
            width: 60px;
            height: 60px;
            background: #1a1a3e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .avatar-option:hover, .avatar-option.selected {
            border-color: #e94560;
            transform: scale(1.05);
            box-shadow: 0 0 15px #e94560;
        }

        .btn {
            background: linear-gradient(135deg, #e94560, #b91c3c);
            padding: 10px 20px;
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            margin-bottom: 10px;
        }

        .cooldown {
            font-size: 12px;
            color: #aaa;
            margin-top: 5px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 50px;
            background: #0f172a;
            border: none;
            color: white;
            text-align: center;
            margin: 10px 0;
        }

        .hidden {
            display: none;
        }

        .error-message {
            color: #ff6b6b;
            text-align: center;
            margin-top: 10px;
        }

        .player-tag {
            font-size: 12px;
            color: #aaa;
            text-align: center;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <!-- Плавающая аватарка (левый верхний угол) -->
    <div class="floating-avatar" id="floatingAvatar" onclick="openProfileModal()">
        <div class="avatar-icon" id="avatarIcon">🎮</div>
    </div>

    <!-- Модальное окно профиля -->
    <div id="profileModal" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeProfileModal()">✖</button>
            <h2 style="text-align:center; margin-bottom:20px;">👤 ПРОФИЛЬ</h2>
            
            <div class="stat-item">
                <span>🏷️ ТЕГ</span>
                <span id="modalTag">#----</span>
            </div>
            <div class="stat-item">
                <span>🏆 КУБКИ</span>
                <span id="modalCups">0</span>
            </div>
            <div class="stat-item">
                <span>🎲 ОТКРЫТО ЯЩИКОВ</span>
                <span id="modalBoxes">0</span>
            </div>
            <div class="stat-item">
                <span>💰 МОНЕТЫ</span>
                <span id="modalCoins">0</span>
            </div>

            <h3 style="margin:20px 0 10px">🎨 СМЕНИТЬ АВАТАРКУ</h3>
            <div class="avatar-selector" id="avatarSelector">
                <div class="avatar-option" data-avatar="🎮">🎮</div>
                <div class="avatar-option" data-avatar="⭐">⭐</div>
                <div class="avatar-option" data-avatar="🔥">🔥</div>
                <div class="avatar-option" data-avatar="🐺">🐺</div>
                <div class="avatar-option" data-avatar="🤖">🤖</div>
                <div class="avatar-option" data-avatar="👑">👑</div>
                <div class="avatar-option" data-avatar="⚡">⚡</div>
            </div>

            <h3 style="margin:20px 0 10px">✏️ СМЕНИТЬ НИКНЕЙМ</h3>
            <input type="text" id="newNickname" placeholder="Новый никнейм">
            <button class="btn" onclick="changeNickname()">СМЕНИТЬ</button>
            <div id="nicknameCooldown" class="cooldown"></div>
        </div>
    </div>

    <!-- Вход -->
    <div id="authPanel" class="glass-panel" style="max-width:400px; margin:50px auto;">
        <h2 style="text-align:center;">🔐 ВХОД</h2>
        <input type="text" id="nickname" placeholder="Никнейм">
        <div id="adminPasswordGroup" class="hidden">
            <input type="password" id="adminPassword" placeholder="Пароль админа">
        </div>
        <button class="btn" style="width:100%" onclick="login()">ВОЙТИ</button>
        <div id="authMessage" class="error-message"></div>
    </div>

    <!-- Главное меню (пока пустое) -->
    <div id="gamePanel" class="hidden">
        <div class="game-title">
            <h1>⚡ BRAWL BOX ⚡</h1>
        </div>
        <div class="glass-panel" style="text-align:center">
            <h2>🎮 ДОБРО ПОЖАЛОВАТЬ 🎮</h2>
            <p style="color:#aaa; margin:20px">Здесь скоро появится игровой автомат</p>
        </div>
    </div>

    <script>
        let currentPlayerId = null;
        let nextFreeNicknameChange = null;

        async function loadPlayerData() {
            if (!currentPlayerId) return;
            const res = await fetch('/api/player/' + currentPlayerId);
            const data = await res.json();
            if (!data.error) {
                document.getElementById('avatarIcon').innerText = data.avatar || '🎮';
                document.getElementById('modalTag').innerText = data.tag || '#----';
                document.getElementById('modalCups').innerText = data.cups || 0;
                document.getElementById('modalBoxes').innerText = data.total_boxes || 0;
                document.getElementById('modalCoins').innerText = data.coins || 0;
                
                if (data.next_free_nickname_change) {
                    nextFreeNicknameChange = new Date(data.next_free_nickname_change);
                    updateNicknameCooldown();
                }
            }
        }

        async function changeAvatar(avatar) {
            await fetch('/api/change_avatar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ playerId: currentPlayerId, avatar: avatar })
            });
            document.getElementById('avatarIcon').innerText = avatar;
        }

        async function changeNickname() {
            const newNick = document.getElementById('newNickname').value.trim();
            if (!newNick) return alert('Введи никнейм');
            
            const res = await fetch('/api/change_nickname', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ playerId: currentPlayerId, newNickname: newNick })
            });
            const data = await res.json();
            if (data.success) {
                alert('Никнейм изменён!');
                if (data.next_free_change) {
                    nextFreeNicknameChange = new Date(data.next_free_change);
                    updateNicknameCooldown();
                }
            } else {
                alert(data.message || 'Ошибка');
            }
        }

        function updateNicknameCooldown() {
            const cooldownDiv = document.getElementById('nicknameCooldown');
            if (!nextFreeNicknameChange) {
                cooldownDiv.innerText = '✅ Бесплатная смена доступна';
                return;
            }
            const now = new Date();
            if (now >= nextFreeNicknameChange) {
                cooldownDiv.innerText = '✅ Бесплатная смена доступна';
                nextFreeNicknameChange = null;
            } else {
                const hours = Math.ceil((nextFreeNicknameChange - now) / (1000 * 60 * 60));
                cooldownDiv.innerText = `⏳ Следующая бесплатная смена через ${hours} часов`;
                setTimeout(updateNicknameCooldown, 60 * 60 * 1000);
            }
        }

        function openProfileModal() {
            loadPlayerData();
            document.getElementById('profileModal').style.display = 'flex';
        }

        function closeProfileModal() {
            document.getElementById('profileModal').style.display = 'none';
        }

        async function login() {
            const nickname = document.getElementById('nickname').value.trim();
            if (!nickname) return;
            let password = '';
            if (nickname === 'unity') {
                password = document.getElementById('adminPassword').value;
                if (!password) return alert('Введи пароль админа');
            }
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nickname, password })
            });
            const data = await res.json();
            if (data.success) {
                currentPlayerId = data.player.id;
                document.getElementById('authPanel').classList.add('hidden');
                document.getElementById('gamePanel').classList.remove('hidden');
                document.getElementById('floatingAvatar').classList.remove('hidden');
                loadPlayerData();
                
                document.querySelectorAll('.avatar-option').forEach(opt => {
                    opt.onclick = () => changeAvatar(opt.getAttribute('data-avatar'));
                });
            } else {
                document.getElementById('authMessage').innerText = data.message;
            }
        }

        document.getElementById('nickname').addEventListener('input', function(e) {
            const adminGroup = document.getElementById('adminPasswordGroup');
            adminGroup.classList.toggle('hidden', e.target.value !== 'unity');
        });

        // Закрытие модалки по клику вне окна
        window.onclick = function(event) {
            const modal = document.getElementById('profileModal');
            if (event.target === modal) closeProfileModal();
        };
    </script>
</body>
</html>
