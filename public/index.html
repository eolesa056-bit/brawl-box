<!DOCTYPE html>
<html>
<head>
    <title>Brawl Box Simulator</title>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0a2a, #050510);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 500px; margin: 0 auto; text-align: center; }
        h1 {
            font-size: 42px;
            margin: 20px 0;
            background: linear-gradient(135deg, #fff, #e94560);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .auth-box, .game-box {
            background: rgba(15, 25, 45, 0.85);
            backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 30px;
            margin: 20px auto;
            border: 1px solid rgba(233,69,96,0.5);
        }
        input {
            padding: 12px;
            margin: 8px;
            border-radius: 50px;
            border: none;
            width: 240px;
            background: #0f172a;
            color: white;
            text-align: center;
        }
        button {
            background: linear-gradient(135deg, #e94560, #b91c3c);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            margin: 10px;
            border-radius: 50px;
            cursor: pointer;
        }
        .open-btn {
            background: linear-gradient(135deg, #00ff88, #00aa55);
            color: #000;
            font-size: 20px;
            padding: 15px 40px;
        }
        .reward {
            font-size: 26px;
            margin: 15px 0;
            color: #f9a826;
            animation: pop 0.3s;
        }
        @keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .stats {
            background: rgba(10, 20, 40, 0.8);
            padding: 20px;
            border-radius: 25px;
            margin-top: 20px;
            border: 1px solid #e94560;
        }
        .stats span { color: #f9a826; font-weight: bold; font-size: 22px; }
        .error { color: #ff6b6b; margin-top: 10px; }
        .admin-badge {
            background: #e94560;
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎁 BRAWL BOX SIMULATOR</h1>
        
        <div id="authBox" class="auth-box">
            <h2>⚡ ВОЙДИ В ИГРУ ⚡</h2>
            <input type="text" id="nickname" placeholder="Твой ник"><br>
            <div id="adminPasswordBox" style="display:none;">
                <input type="password" id="adminPassword" placeholder="Пароль админа"><br>
            </div>
            <button onclick="login()">🔓 ВОЙТИ</button>
            <div id="authMessage" class="error"></div>
        </div>
        
        <div id="gameBox" class="game-box" style="display:none">
            <div style="font-size: 70px;">🎁</div>
            <button id="openBtn" class="open-btn" onclick="openBox()">🔥 ОТКРЫТЬ ЯЩИК 🔥</button>
            <div id="reward" class="reward"></div>
            <div class="stats">
                <p>💰 МОНЕТЫ: <span id="coins">0</span></p>
                <p>🎲 ОТКРЫТО ЯЩИКОВ: <span id="boxes">0</span></p>
                <p>🏆 ИГРОК: <span id="nicknameDisplay"></span> <span id="adminBadge" class="admin-badge" style="display:none;">👑 АДМИН</span></p>
            </div>
        </div>
    </div>

    <script>
        let currentPlayerId = null;
        let isAdminMode = false;
        
        // Проверяем, ввёл ли пользователь 'unity'
        document.getElementById('nickname').addEventListener('input', function(e) {
            const adminBox = document.getElementById('adminPasswordBox');
            if (e.target.value === 'unity') {
                adminBox.style.display = 'block';
            } else {
                adminBox.style.display = 'none';
                document.getElementById('adminPassword').value = '';
            }
        });
        
        async function login() {
            const nickname = document.getElementById('nickname').value.trim();
            if (!nickname) {
                document.getElementById('authMessage').innerText = 'Введи ник!';
                return;
            }
            
            let password = '';
            if (nickname === 'unity') {
                password = document.getElementById('adminPassword').value;
                if (!password) {
                    document.getElementById('authMessage').innerText = 'Введи пароль администратора!';
                    return;
                }
            }
            
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nickname, password })
            });
            const data = await res.json();
            
            if (data.success) {
                currentPlayerId = data.player.id;
                document.getElementById('nicknameDisplay').innerText = data.player.nickname;
                document.getElementById('coins').innerText = data.player.coins;
                document.getElementById('boxes').innerText = data.player.total_boxes;
                
                if (data.player.is_admin) {
                    document.getElementById('adminBadge').style.display = 'inline-block';
                    isAdminMode = true;
                }
                
                document.getElementById('authBox').style.display = 'none';
                document.getElementById('gameBox').style.display = 'block';
            } else {
                document.getElementById('authMessage').innerText = data.message || 'Ошибка входа';
            }
        }
        
        async function openBox() {
            if (!currentPlayerId) return;
            const res = await fetch('/api/open_box/' + currentPlayerId);
            const data = await res.json();
            if (data.success) {
                document.getElementById('reward').innerHTML = `✨ ${data.reward} ✨`;
                document.getElementById('coins').innerText = data.coins;
                document.getElementById('boxes').innerText = data.total_boxes;
                setTimeout(() => document.getElementById('reward').innerHTML = '', 2000);
            }
        }
    </script>
</body>
</html>
