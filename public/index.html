<!DOCTYPE html>
<html>
<head>
    <title>Brawl Stars Box Simulator</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(ellipse at 20% 30%, #0f0c29, #1a1a3e, #0a0a1a);
            min-height: 100vh;
            padding: 20px;
        }

        /* Плавающая аватарка */
        .floating-avatar {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            cursor: pointer;
        }

        .avatar-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #2a2a5a, #1a1a3e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            border: 2px solid #e94560;
            box-shadow: 0 0 15px rgba(233,69,96,0.3);
            transition: 0.2s;
        }

        .avatar-icon:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px #e94560;
        }

        /* Модальные окна */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: linear-gradient(145deg, #0f172a, #020617);
            width: 90%;
            max-width: 500px;
            border-radius: 40px;
            border: 1px solid #e94560;
            box-shadow: 0 0 40px rgba(233,69,96,0.4);
            padding: 25px 20px 30px;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            background: #e94560;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        /* Профиль (первое окно) */
        .profile-top {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: 20px;
        }

        .profile-avatar-large {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #2a2a5a, #1a1a3e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 70px;
            border: 2px solid #e94560;
            margin-bottom: 15px;
        }

        .nickname-text {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #fff, #e94560);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .player-tag {
            font-size: 13px;
            color: #aaa;
            margin: 5px 0;
        }

        /* Кнопки */
        .btn {
            background: linear-gradient(135deg, #e94560, #b91c3c);
            padding: 10px 20px;
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            margin: 10px auto;
            font-weight: bold;
            display: inline-block;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            margin-bottom: 10px;
        }

        /* Галерея аватарок */
        .avatar-selector {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 20px 0;
        }

        .avatar-option {
            width: 70px;
            height: 70px;
            background: #1a1a3e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .avatar-option:hover {
            border-color: #e94560;
            transform: scale(1.05);
            box-shadow: 0 0 15px #e94560;
        }

        .hidden {
            display: none;
        }

        .error-message {
            color: #ff6b6b;
            text-align: center;
            margin-top: 10px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 50px;
            background: #0f172a;
            border: none;
            color: white;
            text-align: center;
            margin: 10px 0;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <!-- Плавающая аватарка -->
    <div class="floating-avatar" onclick="openProfileModal()">
        <div class="avatar-icon" id="avatarIcon">🎮</div>
    </div>

    <!-- ОКНО 1: ПРОФИЛЬ -->
    <div id="profileModal" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeProfileModal()">✖</button>
            
            <div class="profile-top">
                <div class="profile-avatar-large" id="profileAvatar">🎮</div>
                <div class="nickname-text" id="profileNickname">-</div>
                <div class="player-tag" id="profileTag">#----</div>
            </div>

            <div class="stat-item">
                <span>🏆 КУБКИ</span>
                <span id="profileCups">0</span>
            </div>
            <div class="stat-item">
                <span>🎲 ОТКРЫТО ЯЩИКОВ</span>
                <span id="profileBoxes">0</span>
            </div>
            <div class="stat-item">
                <span>💰 МОНЕТЫ</span>
                <span id="profileCoins">0</span>
            </div>

            <div class="button-group">
                <button class="btn" onclick="openAvatarModal()">🎨 СМЕНИТЬ АВАТАРКУ</button>
            </div>
        </div>
    </div>

    <!-- ОКНО 2: ВЫБОР АВАТАРКИ -->
    <div id="avatarModal" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeAvatarModal()">✖</button>
            <h3 style="text-align:center; margin-bottom:20px;">🎨 ВЫБЕРИ АВАТАРКУ</h3>
            <div class="avatar-selector" id="avatarSelector">
                <div class="avatar-option" data-avatar="🎮">🎮</div>
                <div class="avatar-option" data-avatar="⭐">⭐</div>
                <div class="avatar-option" data-avatar="🔥">🔥</div>
                <div class="avatar-option" data-avatar="🐺">🐺</div>
                <div class="avatar-option" data-avatar="🤖">🤖</div>
                <div class="avatar-option" data-avatar="👑">👑</div>
                <div class="avatar-option" data-avatar="⚡">⚡</div>
            </div>
        </div>
    </div>

    <!-- Вход -->
    <div id="authPanel" class="modal" style="display:flex; background:rgba(0,0,0,0.95);">
        <div class="modal-content">
            <h2 style="text-align:center;">🔐 ВХОД</h2>
            <input type="text" id="nickname" placeholder="Никнейм">
            <div id="adminPasswordGroup" class="hidden">
                <input type="password" id="adminPassword" placeholder="Пароль админа">
            </div>
            <button class="btn" style="width:100%" onclick="login()">ВОЙТИ</button>
            <div id="authMessage" class="error-message"></div>
        </div>
    </div>

    <!-- Главное меню (пустое) -->
    <div id="gamePanel" class="hidden" style="max-width:600px; margin:100px auto 0; text-align:center;">
        <h1 style="font-size:42px; background:linear-gradient(135deg,#fff,#e94560); -webkit-background-clip:text; background-clip:text; color:transparent;">⚡ BRAWL BOX ⚡</h1>
        <div style="background:rgba(15,25,45,0.85); border-radius:32px; padding:40px; margin-top:20px;">
            <p style="color:#aaa;">Здесь скоро появится игровой автомат</p>
        </div>
    </div>

    <script>
        let currentPlayerId = null;

        // Загрузка данных профиля
        async function loadProfileData() {
            if (!currentPlayerId) return;
            const res = await fetch('/api/player/' + currentPlayerId);
            const data = await res.json();
            if (!data.error) {
                document.getElementById('avatarIcon').innerText = data.avatar || '🎮';
                document.getElementById('profileAvatar').innerText = data.avatar || '🎮';
                document.getElementById('profileNickname').innerText = data.nickname;
                document.getElementById('profileTag').innerText = data.tag || '#----';
                document.getElementById('profileCups').innerText = data.cups || 0;
                document.getElementById('profileBoxes').innerText = data.total_boxes || 0;
                document.getElementById('profileCoins').innerText = data.coins || 0;
            }
        }

        // Смена аватарки
        async function changeAvatar(avatar) {
            await fetch('/api/change_avatar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ playerId: currentPlayerId, avatar: avatar })
            });
            await loadProfileData();
            closeAvatarModal();
        }

        // Открытие / закрытие окон
        function openProfileModal() {
            loadProfileData();
            document.getElementById('profileModal').style.display = 'flex';
        }

        function closeProfileModal() {
            document.getElementById('profileModal').style.display = 'none';
        }

        function openAvatarModal() {
            document.getElementById('avatarModal').style.display = 'flex';
        }

        function closeAvatarModal() {
            document.getElementById('avatarModal').style.display = 'none';
        }

        // Вход
        async function login() {
            const nickname = document.getElementById('nickname').value.trim();
            if (!nickname) return;
            let password = '';
            if (nickname === 'unity') {
                password = document.getElementById('adminPassword').value;
                if (!password) return alert('Введи пароль админа');
            }
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nickname, password })
            });
            const data = await res.json();
            if (data.success) {
                currentPlayerId = data.player.id;
                document.getElementById('authPanel').style.display = 'none';
                document.getElementById('gamePanel').classList.remove('hidden');
                await loadProfileData();
                
                // Назначаем обработчики аватарок
                document.querySelectorAll('.avatar-option').forEach(opt => {
                    opt.onclick = () => changeAvatar(opt.getAttribute('data-avatar'));
                });
            } else {
                document.getElementById('authMessage').innerText = data.message;
            }
        }

        // Поле пароля для админа
        document.getElementById('nickname').addEventListener('input', function(e) {
            const adminGroup = document.getElementById('adminPasswordGroup');
            adminGroup.classList.toggle('hidden', e.target.value !== 'unity');
        });

        // Закрытие окон по клику вне их
        window.onclick = function(event) {
            const profileModal = document.getElementById('profileModal');
            const avatarModal = document.getElementById('avatarModal');
            if (event.target === profileModal) closeProfileModal();
            if (event.target === avatarModal) closeAvatarModal();
        };
    </script>
</body>
</html>
