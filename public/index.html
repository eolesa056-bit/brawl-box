<!DOCTYPE html>
<html>
<head>
    <title>Brawl Box Simulator</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0a2a, #050510);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes neonPulse {
            0% { text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #e94560, 0 0 30px #e94560; }
            100% { text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #e94560, 0 0 40px #e94560; }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .game-container {
            max-width: 550px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 48px;
            margin: 20px 0;
            background: linear-gradient(135deg, #fff, #e94560);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: neonPulse 2s infinite alternate;
        }

        .auth-box, .game-box {
            background: rgba(15, 25, 45, 0.85);
            backdrop-filter: blur(12px);
            padding: 35px;
            border-radius: 30px;
            margin: 20px auto;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 15px rgba(233,69,96,0.3);
            border: 1px solid rgba(233,69,96,0.5);
        }

        input {
            padding: 14px;
            margin: 10px;
            border-radius: 50px;
            border: none;
            width: 260px;
            font-size: 15px;
            background: #0f172a;
            color: white;
            text-align: center;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            box-shadow: 0 0 15px #e94560;
            transform: scale(1.02);
        }

        button {
            background: linear-gradient(135deg, #e94560, #b91c3c);
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: bold;
            margin: 10px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(233,69,96,0.5);
        }

        .open-btn {
            background: linear-gradient(135deg, #00ff88, #00aa55);
            color: #000;
            font-size: 22px;
            padding: 18px 45px;
            font-weight: bold;
            box-shadow: 0 0 15px #00ff88;
        }

        .open-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #00ff88;
        }

        .reward {
            font-size: 28px;
            margin: 20px 0;
            background: linear-gradient(135deg, #f9a826, #ffd700);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: bold;
            animation: float 0.5s ease-out;
        }

        .stats {
            background: rgba(10, 20, 40, 0.8);
            padding: 20px;
            border-radius: 25px;
            margin-top: 20px;
            border: 1px solid #e94560;
        }

        .stats p {
            margin: 12px 0;
            font-size: 18px;
        }

        .stats span {
            color: #f9a826;
            font-weight: bold;
            font-size: 22px;
        }

        .admin-btn {
            background: linear-gradient(135deg, #7c3aed, #5b21b6);
            margin-top: 20px;
            width: 100%;
        }

        .admin-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .admin-window {
            background: linear-gradient(145deg, #0f172a, #020617);
            width: 95%;
            max-width: 600px;
            height: 85%;
            border-radius: 30px;
            box-shadow: 0 0 50px rgba(233,69,96,0.4);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #e94560;
        }

        .admin-header {
            background: #1e1b4b;
            padding: 18px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e94560;
        }

        .close-btn {
            background: #e94560;
            padding: 6px 18px;
            margin: 0;
        }

        .burger-menu {
            background: #111827;
            padding: 15px;
            border-bottom: 1px solid #e94560;
        }

        .burger-btn {
            background: #e94560;
            width: 100%;
            padding: 12px;
            font-size: 18px;
        }

        .menu-items {
            display: none;
            flex-direction: column;
            margin-top: 12px;
        }

        .menu-items button {
            background: #1e293b;
            text-align: left;
            margin: 5px 0;
        }

        .admin-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .user-item, .promo-item, .report-item {
            background: #1e293b;
            padding: 15px;
            margin: 12px 0;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #e94560;
        }

        .status-banned { background: #dc2626; color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .status-active { background: #10b981; color: black; padding: 4px 12px; border-radius: 20px; font-size: 12px; }

        @media (max-width: 480px) {
            h1 { font-size: 32px; }
            .open-btn { font-size: 18px; padding: 12px 25px; }
            .user-item { flex-direction: column; text-align: center; gap: 10px; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎁 BRAWL BOX SIMULATOR</h1>
        
        <div id="authBox" class="auth-box">
            <h2>⚡ ВОЙДИ В ИГРУ ⚡</h2>
            <input type="text" id="login" placeholder="Логин"><br>
            <input type="password" id="password" placeholder="Пароль"><br>
            <input type="text" id="nickname" placeholder="Ник (для регистрации)"><br>
            <button onclick="register()">📝 РЕГИСТРАЦИЯ</button>
            <button onclick="login()">🔓 ВХОД</button>
            <div id="authMessage" style="color: #f97316; margin-top: 15px;"></div>
        </div>
        
        <div id="gameBox" class="game-box" style="display:none">
            <div style="font-size: 60px; margin-bottom: 10px;">🎁</div>
            <button id="openBtn" class="open-btn">🔥 ОТКРЫТЬ ЯЩИК 🔥</button>
            <div id="reward" class="reward"></div>
            <div class="stats">
                <p>💰 МОНЕТЫ: <span id="coins">0</span></p>
                <p>🎲 ОТКРЫТО ЯЩИКОВ: <span id="boxes">0</span></p>
                <p>🏆 ИГРОК: <span id="nicknameDisplay"></span></p>
                <button id="adminBtn" class="admin-btn" style="display:none" onclick="openAdminWindow()">👑 АДМИН-ПАНЕЛЬ</button>
            </div>
        </div>
    </div>

    <div id="adminOverlay" class="admin-overlay">
        <div class="admin-window">
            <div class="admin-header">
                <h2>🔧 АДМИН-ПАНЕЛЬ</h2>
                <button class="close-btn" onclick="closeAdminWindow()">✖ ЗАКРЫТЬ</button>
            </div>
            <div class="burger-menu">
                <button class="burger-btn" onclick="toggleMenu()">☰ МЕНЮ</button>
                <div id="menuItems" class="menu-items">
                    <button onclick="showSection('users')">👥 УПРАВЛЕНИЕ ИГРОКАМИ</button>
                    <button onclick="showSection('promocodes')">🎁 ПРОМОКОДЫ</button>
                    <button onclick="showSection('reports')">📋 РЕПОРТЫ</button>
                    <button onclick="showSection('events')">🎉 ИВЕНТЫ</button>
                </div>
            </div>
            <div id="adminContent" class="admin-content"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentUserId = null;
        let isAdmin = false;

        async function register() {
            const login = document.getElementById('login').value.trim();
            const password = document.getElementById('password').value;
            const nickname = document.getElementById('nickname').value.trim();
            if (!login || !password || !nickname) return alert('Заполни все поля!');
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ login, password, nickname })
            });
            const data = await res.json();
            if (data.success) alert('✅ Регистрация успешна! Теперь войди.');
            else document.getElementById('authMessage').innerText = data.message;
        }

        async function login() {
            const login = document.getElementById('login').value;
            const password = document.getElementById('password').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ login, password })
            });
            const data = await res.json();
            if (data.success) {
                currentUserId = data.user.id;
                isAdmin = data.user.is_admin === 1;
                document.getElementById('nicknameDisplay').innerText = data.user.nickname;
                document.getElementById('authBox').style.display = 'none';
                document.getElementById('gameBox').style.display = 'block';
                if (isAdmin) document.getElementById('adminBtn').style.display = 'block';
                socket.emit('auth', currentUserId);
                updateStats();
            } else {
                document.getElementById('authMessage').innerText = data.message;
            }
        }

        async function updateStats() {
            if (!currentUserId) return;
            const res = await fetch('/api/user/' + currentUserId);
            const data = await res.json();
            if (!data.error) {
                document.getElementById('coins').innerText = data.coins;
                document.getElementById('boxes').innerText = data.total_boxes;
            }
        }

        document.getElementById('openBtn').onclick = () => {
            if (currentUserId) socket.emit('open_box');
        };

        socket.on('box_opened', (reward) => {
            document.getElementById('reward').innerHTML = `✨ ${reward.name} ✨`;
            updateStats();
            setTimeout(() => document.getElementById('reward').innerHTML = '', 2000);
        });

        socket.on('session_terminated', (data) => {
            const reason = data && data.reason ? data.reason : 'Нарушение правил';
            alert(`⛔ СЕССИЯ ЗАВЕРШЕНА! ПЕРЕЗАГРУЗИТЕ ИГРУ ⛔\n\nПричина бана: ${reason}`);
            window.location.reload();
        });

        setInterval(updateStats, 3000);

        function openAdminWindow() { document.getElementById('adminOverlay').style.display = 'flex'; }
        function closeAdminWindow() { document.getElementById('adminOverlay').style.display = 'none'; }
        function toggleMenu() {
            const menu = document.getElementById('menuItems');
            menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
        }

        function showSection(section) {
            const content = document.getElementById('adminContent');
            if (section === 'users') loadUsersPanel(content);
            else if (section === 'promocodes') loadPromosPanel(content);
            else if (section === 'reports') loadReportsPanel(content);
            else if (section === 'events') loadEventsPanel(content);
            toggleMenu();
        }

        async function loadUsersPanel(container) {
            const res = await fetch('/api/users');
            const users = await res.json();
            let html = `<h3>👥 УПРАВЛЕНИЕ ИГРОКАМИ</h3>`;
            for (const u of users) {
                html += `
                    <div class="user-item">
                        <div><strong>${u.nickname}</strong><br>${u.login}<br>💰 ${u.coins} | 🎁 ${u.total_boxes}<br><span class="${u.is_banned ? 'status-banned' : 'status-active'}">${u.is_banned ? '⛔ ЗАБАНЕН' : '✅ АКТИВЕН'}</span></div>
                        <div>${u.is_banned ? `<button onclick="unbanUser(${u.id})">✅ РАЗБАНИТЬ</button>` : (u.login !== 'unity' ? `<button onclick="banUser(${u.id}, '${u.nickname}')">🔨 ЗАБАНИТЬ</button>` : '👑 АДМИН')}</div>
                    </div>`;
            }
            container.innerHTML = html;
        }

        window.banUser = async (userId, nickname) => {
            const reason = prompt(`Причина бана для ${nickname}:`, 'Нарушение правил');
            if (!reason) return;
            await fetch('/api/ban', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId, reason }) });
            loadUsersPanel(document.getElementById('adminContent'));
        };

        window.unbanUser = async (userId) => {
            await fetch('/api/unban', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId }) });
            loadUsersPanel(document.getElementById('adminContent'));
        };

        async function loadPromosPanel(container) {
            const res = await fetch('/api/promocodes');
            const promos = await res.json();
            let html = `<h3>🎁 ПРОМОКОДЫ</h3><div id="promoList">`;
            if (promos.length === 0) html += `<p>Пока нет промокодов</p>`;
            else for (const p of promos) html += `<div class="promo-item"><strong>${p.code}</strong> — ${p.reward}<br>Активаций: ${p.current_activations}/${p.max_activations}</div>`;
            html += `</div><h4>➕ СОЗДАТЬ</h4><input type="text" id="promoCode" placeholder="Код"><br><input type="text" id="promoReward" placeholder="Награда (100 монет)"><br><input type="number" id="promoMax" placeholder="Лимит"><br><button onclick="createPromo()">СОЗДАТЬ</button>`;
            container.innerHTML = html;
        }

        window.createPromo = async () => {
            const code = document.getElementById('promoCode').value;
            const reward = document.getElementById('promoReward').value;
            const max = parseInt(document.getElementById('promoMax').value);
            if (!code || !reward || !max) return alert('Заполни все поля!');
            await fetch('/api/create_promo', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ code, reward, max }) });
            showSection('promocodes');
        };

        async function loadReportsPanel(container) {
            const res = await fetch('/api/reports');
            const reports = await res.json();
            let html = `<h3>📋 ЖАЛОБЫ ИГРОКОВ</h3>`;
            if (reports.length === 0) html += `<p>Нет жалоб</p>`;
            else for (const r of reports) html += `<div class="report-item"><strong>От:</strong> ${r.from_nick}<br><strong>На:</strong> ${r.to_nick}<br><strong>Причина:</strong> ${r.reason}<br><button onclick="resolveReport(${r.id}, 'ban')">🔨 ЗАБАНИТЬ НАРУШИТЕЛЯ</button> <button onclick="resolveReport(${r.id}, 'reject')">❌ ОТКЛОНИТЬ</button></div>`;
            container.innerHTML = html;
        }

        window.resolveReport = async (reportId, action) => {
            await fetch('/api/resolve_report', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ reportId, action }) });
            showSection('reports');
        };

        async function loadEventsPanel(container) {
            const res = await fetch('/api/events');
            const events = await res.json();
            let html = `<h3>🎉 ИВЕНТЫ</h3><div id="eventsList">`;
            if (events.length === 0) html += `<p>Нет активных ивентов</p>`;
            else for (const e of events) html += `<div class="promo-item"><strong>${e.name}</strong> (${e.event_type})<br><button onclick="stopEvent(${e.id})">⏹ ОСТАНОВИТЬ</button></div>`;
            html += `</div><h4>➕ НОВЫЙ ИВЕНТ</h4><input type="text" id="eventName" placeholder="Название"><br><select id="eventType"><option value="double_cups">x2 Кубки</option><option value="free_box">Бесплатный ящик</option><option value="guaranteed_legendary">Гарант легендарки</option></select><br><input type="datetime-local" id="eventEnd"><br><button onclick="createEvent()">СОЗДАТЬ</button>`;
            container.innerHTML = html;
        }

        window.stopEvent = async (eventId) => {
            await fetch('/api/stop_event', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ eventId }) });
            showSection('events');
        };

        window.createEvent = async () => {
            const name = document.getElementById('eventName').value;
            const type = document.getElementById('eventType').value;
            const end_time = document.getElementById('eventEnd').value;
            if (!name || !end_time) return alert('Заполни поля!');
            await fetch('/api/create_event', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, type, end_time }) });
            showSection('events');
        };

        document.getElementById('adminOverlay').onclick = (e) => { if (e.target === document.getElementById('adminOverlay')) closeAdminWindow(); };
    </script>
</body>
</html>
