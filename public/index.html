<!DOCTYPE html>
<html>
<head>
    <title>Brawl Stars Box Simulator</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(ellipse at 20% 30%, #0f0c29, #1a1a3e, #0a0a1a);
            min-height: 100vh;
            padding: 20px;
        }

        .game-container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* Заголовок */
        .title {
            text-align: center;
            margin-bottom: 20px;
        }

        .title h1 {
            font-size: 42px;
            background: linear-gradient(135deg, #fff, #e94560);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Стили панелей */
        .glass-panel {
            background: rgba(15, 25, 45, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(233, 69, 96, 0.4);
            padding: 20px;
            margin-bottom: 20px;
        }

        /* ========== ШАПКА ПРОФИЛЯ ========== */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .avatar {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #2a2a5a, #1a1a3e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            border: 2px solid #e94560;
            cursor: pointer;
            transition: 0.2s;
        }

        .avatar:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px #e94560;
        }

        .player-info {
            flex: 1;
        }

        .nickname-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 5px;
        }

        .nickname {
            font-size: 22px;
            font-weight: bold;
            background: linear-gradient(135deg, #fff, #e94560);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .edit-nickname {
            background: rgba(233,69,96,0.3);
            border: 1px solid #e94560;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
            transition: 0.2s;
        }

        .edit-nickname:hover {
            background: #e94560;
            color: white;
        }

        .player-tag {
            font-size: 11px;
            color: #aaa;
        }

        .cups {
            font-size: 16px;
            color: #f9a826;
            font-weight: bold;
        }

        /* Табы */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border: none;
            padding: 10px;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .tab-btn.active {
            background: #e94560;
            box-shadow: 0 0 10px #e94560;
        }

        /* Вкладка профиля */
        .profile-section {
            display: none;
        }

        .profile-section.active {
            display: block;
        }

        .avatar-selector {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin: 20px 0;
            justify-content: center;
        }

        .avatar-option {
            width: 60px;
            height: 60px;
            background: #1a1a3e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .avatar-option:hover, .avatar-option.selected {
            border-color: #e94560;
            transform: scale(1.05);
            box-shadow: 0 0 15px #e94560;
        }

        .btn {
            background: linear-gradient(135deg, #e94560, #b91c3c);
            padding: 10px 20px;
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }

        .cooldown {
            font-size: 12px;
            color: #aaa;
            margin-top: 5px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            margin-bottom: 10px;
        }

        .hidden {
            display: none;
        }

        .error-message {
            color: #ff6b6b;
            text-align: center;
            margin-top: 10px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 50px;
            background: #0f172a;
            border: none;
            color: white;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="title">
            <h1>⚡ BRAWL BOX ⚡</h1>
        </div>

        <!-- Вход -->
        <div id="authPanel" class="glass-panel">
            <h2 style="text-align:center; margin-bottom:20px;">🔐 ВХОД</h2>
            <input type="text" id="nickname" placeholder="Никнейм">
            <div id="adminPasswordGroup" class="hidden">
                <input type="password" id="adminPassword" placeholder="Пароль админа">
            </div>
            <button class="btn" style="width:100%" onclick="login()">ВОЙТИ</button>
            <div id="authMessage" class="error-message"></div>
        </div>

        <!-- Игра (главная панель) -->
        <div id="gamePanel" class="hidden">
            <!-- Шапка профиля -->
            <div class="glass-panel">
                <div class="profile-header">
                    <div class="avatar" id="avatarPreview" onclick="switchTab('profile')">🎮</div>
                    <div class="player-info">
                        <div class="nickname-row">
                            <span class="nickname" id="nicknameDisplay">-</span>
                            <span class="edit-nickname" onclick="switchTab('profile')">✏️</span>
                        </div>
                        <div class="player-tag" id="playerTag">#----</div>
                        <div class="cups">🏆 <span id="cups">0</span> кубков</div>
                    </div>
                </div>
            </div>

            <!-- Табы -->
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('main')">🏠 ГЛАВНАЯ</button>
                <button class="tab-btn" onclick="switchTab('profile')">👤 ПРОФИЛЬ</button>
            </div>

            <!-- Главная вкладка (пока пустая) -->
            <div id="mainTab" class="glass-panel" style="text-align:center">
                <h2>🎮 ДОБРО ПОЖАЛОВАТЬ 🎮</h2>
                <p style="color:#aaa; margin:20px">Здесь скоро появится игровой автомат</p>
            </div>

            <!-- Вкладка профиля -->
            <div id="profileTab" class="glass-panel profile-section">
                <h3>👤 НАСТРОЙКИ ПРОФИЛЯ</h3>
                
                <div class="stat-item">
                    <span>🎲 Открыто ящиков</span>
                    <span id="profileBoxes">0</span>
                </div>
                <div class="stat-item">
                    <span>💰 Монет</span>
                    <span id="profileCoins">0</span>
                </div>
                <div class="stat-item">
                    <span>🏆 Кубков</span>
                    <span id="profileCups">0</span>
                </div>

                <h4 style="margin:20px 0 10px">🎨 ВЫБЕРИ АВАТАРКУ</h4>
                <div class="avatar-selector" id="avatarSelector">
                    <div class="avatar-option" data-avatar="🎮">🎮</div>
                    <div class="avatar-option" data-avatar="⭐">⭐</div>
                    <div class="avatar-option" data-avatar="🔥">🔥</div>
                    <div class="avatar-option" data-avatar="🐺">🐺</div>
                    <div class="avatar-option" data-avatar="🤖">🤖</div>
                    <div class="avatar-option" data-avatar="👑">👑</div>
                </div>

                <h4 style="margin:20px 0 10px">✏️ СМЕНИТЬ НИКНЕЙМ</h4>
                <input type="text" id="newNickname" placeholder="Новый никнейм">
                <button class="btn" onclick="changeNickname()">СМЕНИТЬ</button>
                <div id="nicknameCooldown" class="cooldown"></div>
            </div>
        </div>
    </div>

    <script>
        let currentPlayerId = null;
        let nextFreeNicknameChange = null;

        // Загрузка данных игрока
        async function loadPlayerData() {
            if (!currentPlayerId) return;
            const res = await fetch('/api/player/' + currentPlayerId);
            const data = await res.json();
            if (!data.error) {
                document.getElementById('nicknameDisplay').innerText = data.nickname;
                document.getElementById('playerTag').innerText = data.tag || '#----';
                document.getElementById('cups').innerText = data.cups || 0;
                document.getElementById('profileBoxes').innerText = data.total_boxes || 0;
                document.getElementById('profileCoins').innerText = data.coins || 0;
                document.getElementById('profileCups').innerText = data.cups || 0;
                if (data.avatar) document.getElementById('avatarPreview').innerText = data.avatar;
                
                // Таймер смены ника
                if (data.next_free_nickname_change) {
                    nextFreeNicknameChange = new Date(data.next_free_nickname_change);
                    updateNicknameCooldown();
                }
            }
        }

        // Смена аватарки
        async function changeAvatar(avatar) {
            await fetch('/api/change_avatar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ playerId: currentPlayerId, avatar: avatar })
            });
            document.getElementById('avatarPreview').innerText = avatar;
        }

        // Смена никнейма
        async function changeNickname() {
            const newNick = document.getElementById('newNickname').value.trim();
            if (!newNick) return alert('Введи никнейм');
            
            const res = await fetch('/api/change_nickname', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ playerId: currentPlayerId, newNickname: newNick })
            });
            const data = await res.json();
            if (data.success) {
                alert('Никнейм изменён!');
                loadPlayerData();
                if (data.next_free_change) {
                    nextFreeNicknameChange = new Date(data.next_free_change);
                    updateNicknameCooldown();
                }
            } else {
                alert(data.message || 'Ошибка');
            }
        }

        // Таймер кулдауна смены ника
        function updateNicknameCooldown() {
            const cooldownDiv = document.getElementById('nicknameCooldown');
            if (!nextFreeNicknameChange) {
                cooldownDiv.innerText = '✅ Бесплатная смена доступна';
                return;
            }
            const now = new Date();
            if (now >= nextFreeNicknameChange) {
                cooldownDiv.innerText = '✅ Бесплатная смена доступна';
                nextFreeNicknameChange = null;
            } else {
                const hours = Math.ceil((nextFreeNicknameChange - now) / (1000 * 60 * 60));
                cooldownDiv.innerText = `⏳ Следующая бесплатная смена через ${hours} часов`;
                setTimeout(updateNicknameCooldown, 60 * 60 * 1000);
            }
        }

        // Переключение табов
        function switchTab(tab) {
            const mainTab = document.getElementById('mainTab');
            const profileTab = document.getElementById('profileTab');
            const btns = document.querySelectorAll('.tab-btn');
            
            btns.forEach(btn => btn.classList.remove('active'));
            
            if (tab === 'main') {
                mainTab.style.display = 'block';
                profileTab.classList.remove('active');
                btns[0].classList.add('active');
            } else {
                mainTab.style.display = 'none';
                profileTab.classList.add('active');
                btns[1].classList.add('active');
                loadPlayerData();
            }
        }

        // Вход
        async function login() {
            const nickname = document.getElementById('nickname').value.trim();
            if (!nickname) return;
            let password = '';
            if (nickname === 'unity') {
                password = document.getElementById('adminPassword').value;
                if (!password) return alert('Введи пароль админа');
            }
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nickname, password })
            });
            const data = await res.json();
            if (data.success) {
                currentPlayerId = data.player.id;
                document.getElementById('authPanel').classList.add('hidden');
                document.getElementById('gamePanel').classList.remove('hidden');
                loadPlayerData();
                
                // Подгрузка аватарок
                document.querySelectorAll('.avatar-option').forEach(opt => {
                    opt.onclick = () => changeAvatar(opt.getAttribute('data-avatar'));
                });
            } else {
                document.getElementById('authMessage').innerText = data.message;
            }
        }

        // Поле пароля для админа
        document.getElementById('nickname').addEventListener('input', function(e) {
            const adminGroup = document.getElementById('adminPasswordGroup');
            adminGroup.classList.toggle('hidden', e.target.value !== 'unity');
        });
    </script>
</body>
</html>
