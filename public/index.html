<!DOCTYPE html>
<html>
<head>
    <title>Brawl Stars Box Simulator - Путь к славе</title>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(ellipse at 20% 30%, #0f0c29, #1a1a3e, #0a0a1a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Контейнер пути к славе */
        .glory-container {
            background: linear-gradient(145deg, #0a0f1f, #030614);
            width: 100%;
            max-width: 1000px;
            border-radius: 50px;
            border: 2px solid #e94560;
            padding: 30px;
            box-shadow: 0 0 50px rgba(233,69,96,0.4);
        }

        .glory-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .glory-header h1 {
            font-size: 36px;
            background: linear-gradient(135deg, #fff, #f9a826);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .glory-header p {
            color: #aaa;
            font-size: 14px;
            margin-top: 5px;
        }

        /* Трек прогресса */
        .track-container {
            background: rgba(0,0,0,0.5);
            border-radius: 40px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .track-scroll {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 10px 5px;
            scroll-behavior: smooth;
        }

        /* Ступень награды */
        .reward-tier {
            flex: 0 0 140px;
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-radius: 30px;
            padding: 15px;
            text-align: center;
            border: 1px solid #2a2a5a;
            transition: 0.2s;
            position: relative;
        }

        .reward-tier.available {
            border-color: #f9a826;
            background: linear-gradient(145deg, #2a2a5a, #1e293b);
        }

        .reward-tier.claimed {
            opacity: 0.6;
            border-color: #2a2a5a;
        }

        .reward-tier.locked {
            opacity: 0.5;
        }

        .tier-cups {
            font-size: 20px;
            font-weight: bold;
            color: #f9a826;
            margin-bottom: 10px;
        }

        .tier-reward {
            font-size: 28px;
            margin: 10px 0;
        }

        .tier-label {
            font-size: 12px;
            color: #aaa;
            background: rgba(0,0,0,0.5);
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
        }

        .claim-tier-btn {
            background: #e94560;
            border: none;
            padding: 6px 15px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            color: white;
        }

        /* Информация о прогрессе */
        .progress-info {
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }

        .current-cups {
            font-size: 28px;
            font-weight: bold;
            color: #f9a826;
        }

        .next-milestone {
            text-align: right;
        }

        .milestone-cups {
            font-size: 24px;
            font-weight: bold;
            color: #e94560;
        }

        /* Полоса прогресса */
        .progress-bar-container {
            background: #1e293b;
            border-radius: 20px;
            height: 12px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-bar {
            background: linear-gradient(90deg, #f9a826, #e94560);
            width: 0%;
            height: 100%;
            border-radius: 20px;
            transition: width 0.5s;
        }

        /* Кнопка прокрутки */
        .scroll-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .scroll-btn {
            background: #e94560;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
        }

        /* Адаптив */
        @media (max-width: 700px) {
            .glory-container { padding: 20px; }
            .reward-tier { flex: 0 0 120px; }
            .tier-reward { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="glory-container">
        <div class="glory-header">
            <h1>🏆 ПУТЬ К СЛАВЕ 🏆</h1>
            <p>Собирай кубки, чтобы получать награды!</p>
        </div>

        <!-- Информация о прогрессе -->
        <div class="progress-info">
            <div>
                <div style="font-size: 14px; color: #aaa;">ТВОИ КУБКИ</div>
                <div class="current-cups" id="currentCupsDisplay">0</div>
            </div>
            <div class="next-milestone">
                <div style="font-size: 14px; color: #aaa;">ДО СЛЕДУЮЩЕЙ НАГРАДЫ</div>
                <div class="milestone-cups" id="nextMilestone">0</div>
            </div>
        </div>

        <!-- Полоса прогресса -->
        <div class="progress-bar-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <!-- Трек с наградами -->
        <div class="track-container">
            <div class="track-scroll" id="trackScroll"></div>
            <div class="scroll-buttons">
                <button class="scroll-btn" onclick="scrollTrack(-150)">◀</button>
                <button class="scroll-btn" onclick="scrollTrack(150)">▶</button>
            </div>
        </div>
    </div>

    <script>
        // Данные пути к славе (кубки, награда, тип)
        const pathData = [
            { cups: 100, reward: "50💰", type: "coins", label: "Монеты" },
            { cups: 250, reward: "100💰", type: "coins", label: "Монеты" },
            { cups: 500, reward: "🎁", type: "box", label: "Обычный ящик" },
            { cups: 1000, reward: "200💰", type: "coins", label: "Монеты" },
            { cups: 2000, reward: "🎁✨", type: "box", label: "Редкий ящик" },
            { cups: 3500, reward: "500💰", type: "coins", label: "Монеты" },
            { cups: 5000, reward: "🔥", type: "skin", label: "Легендарный скин" },
            { cups: 7500, reward: "1000💰", type: "coins", label: "Монеты" },
            { cups: 10000, reward: "👑", type: "brawler", label: "Эксклюзивный боец" },
            { cups: 15000, reward: "2000💰", type: "coins", label: "Монеты" },
            { cups: 20000, reward: "⭐", type: "box", label: "Мега-ящик" },
            { cups: 30000, reward: "5000💰", type: "coins", label: "Монеты" },
            { cups: 50000, reward: "💎", type: "skin", label: "Алмазный скин" },
            { cups: 75000, reward: "10000💰", type: "coins", label: "Монеты" },
            { cups: 100000, reward: "🏆", type: "trophy", label: "ЗОЛОТОЙ ТРОФЕЙ" }
        ];

        let currentCups = 0;
        let claimedStatus = new Array(pathData.length).fill(false);

        // Загрузка данных из localStorage (или с сервера)
        function loadProgress() {
            const saved = localStorage.getItem('gloryPath');
            if (saved) {
                const data = JSON.parse(saved);
                currentCups = data.cups || 0;
                claimedStatus = data.claimed || claimedStatus;
            }
            updateUI();
        }

        // Сохранение прогресса
        function saveProgress() {
            localStorage.setItem('gloryPath', JSON.stringify({
                cups: currentCups,
                claimed: claimedStatus
            }));
        }

        // Обновить весь интерфейс
        function updateUI() {
            document.getElementById('currentCupsDisplay').innerText = currentCups;
            
            // Найти следующую недоступную награду
            let nextCups = 0;
            for (let tier of pathData) {
                if (tier.cups > currentCups) {
                    nextCups = tier.cups;
                    break;
                }
            }
            document.getElementById('nextMilestone').innerText = nextCups > 0 ? `${nextCups} 🏆` : 'МАКСИМУМ!';
            
            // Полоса прогресса (между последней доступной и следующей)
            let lastCups = 0;
            let nextCupsBar = pathData[0]?.cups || 0;
            for (let i = pathData.length-1; i >= 0; i--) {
                if (pathData[i].cups <= currentCups) {
                    lastCups = pathData[i].cups;
                    nextCupsBar = pathData[i+1]?.cups || pathData[i].cups;
                    break;
                }
            }
            let progressPercent = nextCupsBar > lastCups ? ((currentCups - lastCups) / (nextCupsBar - lastCups)) * 100 : 100;
            progressPercent = Math.min(100, Math.max(0, progressPercent));
            document.getElementById('progressBar').style.width = `${progressPercent}%`;
            
            // Отрисовать награды
            renderTiers();
        }
        
        function renderTiers() {
            const container = document.getElementById('trackScroll');
            container.innerHTML = '';
            pathData.forEach((tier, idx) => {
                const isAvailable = currentCups >= tier.cups && !claimedStatus[idx];
                const isClaimed = claimedStatus[idx];
                const div = document.createElement('div');
                div.className = `reward-tier ${isAvailable ? 'available' : (isClaimed ? 'claimed' : 'locked')}`;
                div.innerHTML = `
                    <div class="tier-cups">${tier.cups}🏆</div>
                    <div class="tier-reward">${tier.reward}</div>
                    <div class="tier-label">${tier.label}</div>
                    ${isAvailable ? `<button class="claim-tier-btn" data-idx="${idx}">ЗАБРАТЬ</button>` : (isClaimed ? '<div style="font-size:20px; margin-top:8px;">✅</div>' : '<div style="font-size:20px; margin-top:8px;">🔒</div>')}
                `;
                container.appendChild(div);
            });
            document.querySelectorAll('.claim-tier-btn').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    const idx = parseInt(btn.getAttribute('data-idx'));
                    claimReward(idx);
                };
            });
        }
        
        function claimReward(idx) {
            const tier = pathData[idx];
            if (currentCups < tier.cups || claimedStatus[idx]) return;
            claimedStatus[idx] = true;
            // Здесь можно отправить запрос на сервер для начисления награды
            alert(`🎉 Вы получили: ${tier.reward} (${tier.label})!`);
            saveProgress();
            updateUI();
        }
        
        function scrollTrack(delta) {
            const container = document.getElementById('trackScroll');
            container.scrollBy({ left: delta, behavior: 'smooth' });
        }
        
        // Имитация добавления кубков (для теста)
        function addCups(amount) {
            currentCups += amount;
            saveProgress();
            updateUI();
        }
        
        loadProgress();
        
        // Для теста — можно добавить кнопку +100 кубков (в реальной игре убрать)
        const testBtn = document.createElement('button');
        testBtn.innerText = '+100 КУБКОВ (ТЕСТ)';
        testBtn.style.position = 'fixed';
        testBtn.style.bottom = '20px';
        testBtn.style.right = '20px';
        testBtn.style.background = '#e94560';
        testBtn.style.border = 'none';
        testBtn.style.padding = '8px 15px';
        testBtn.style.borderRadius = '30px';
        testBtn.style.cursor = 'pointer';
        testBtn.onclick = () => addCups(100);
        document.body.appendChild(testBtn);
    </script>
</body>
</html>
