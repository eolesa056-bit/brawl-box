<!DOCTYPE html>
<html>
<head>
    <title>Brawl Box Simulator</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #1a1a2e;
            color: white;
            padding: 20px;
        }
        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            margin: 10px;
            border-radius: 10px;
            cursor: pointer;
        }
        input {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: none;
            width: 200px;
        }
        .auth-box, .game-box {
            background: #16213e;
            padding: 20px;
            border-radius: 20px;
            max-width: 400px;
            margin: 20px auto;
        }
        .reward {
            font-size: 24px;
            margin: 10px 0;
            color: #f9a826;
        }
        .stats {
            background: #0f3460;
            padding: 15px;
            border-radius: 15px;
            margin-top: 20px;
        }
        .admin-panel {
            background: #0f3460;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .user-item {
            background: #1a1a2e;
            padding: 10px;
            margin: 10px 0;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status-banned { color: #e94560; }
        .status-active { color: #00ff88; }
    </style>
</head>
<body>
    <h1>🎁 Brawl Box Simulator</h1>
    
    <div id="authBox" class="auth-box">
        <h2>🔐 Вход</h2>
        <input type="text" id="login" placeholder="Логин"><br>
        <input type="password" id="password" placeholder="Пароль"><br>
        <input type="text" id="nickname" placeholder="Ник (регистрация)"><br>
        <button onclick="register()">📝 Регистрация</button>
        <button onclick="login()">🔓 Вход</button>
        <div id="authMessage"></div>
    </div>
    
    <div id="gameBox" class="game-box" style="display:none">
        <div id="adminPanel" class="admin-panel" style="display:none">
            <h3>👑 Админ-панель</h3>
            <button onclick="toggleAdminTable()">📋 Управление игроками</button>
            <div id="adminTable" style="display:none; margin-top:15px;"></div>
        </div>
        
        <h2>📦 Ящик</h2>
        <button id="openBtn">🔓 ОТКРЫТЬ ЯЩИК</button>
        <div id="reward" class="reward"></div>
        <div class="stats">
            <p>💰 Монет: <span id="coins">0</span></p>
            <p>🎁 Открыто ящиков: <span id="boxes">0</span></p>
            <p>👤 Игрок: <span id="nicknameDisplay"></span></p>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentUserId = null;
        let isAdmin = false;
        
        async function register() {
            const login = document.getElementById('login').value;
            const password = document.getElementById('password').value;
            const nickname = document.getElementById('nickname').value;
            if (!login || !password || !nickname) return alert('Заполни все поля');
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({login, password, nickname})
            });
            const data = await res.json();
            if (data.success) alert('Регистрация успешна! Теперь войди.');
            else document.getElementById('authMessage').innerText = data.message;
        }
        
        async function login() {
            const login = document.getElementById('login').value;
            const password = document.getElementById('password').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({login, password})
            });
            const data = await res.json();
            if (data.success) {
                currentUserId = data.user.id;
                isAdmin = data.user.is_admin === 1;
                document.getElementById('nicknameDisplay').innerText = data.user.nickname;
                document.getElementById('authBox').style.display = 'none';
                document.getElementById('gameBox').style.display = 'block';
                if (isAdmin) {
                    document.getElementById('adminPanel').style.display = 'block';
                }
                socket.emit('auth', currentUserId);
                updateStats();
            } else {
                document.getElementById('authMessage').innerText = data.message;
            }
        }
        
        async function updateStats() {
            if (!currentUserId) return;
            const res = await fetch('/api/user/' + currentUserId);
            const data = await res.json();
            if (!data.error) {
                document.getElementById('coins').innerText = data.coins;
                document.getElementById('boxes').innerText = data.total_boxes;
            }
        }
        
        async function toggleAdminTable() {
            const container = document.getElementById('adminTable');
            if (container.style.display === 'none') {
                await loadAdminTable();
                container.style.display = 'block';
            } else {
                container.style.display = 'none';
            }
        }
        
        async function loadAdminTable() {
            const res = await fetch('/api/users');
            const users = await res.json();
            let html = '<div style="max-height:300px; overflow-y:auto;">';
            for (const u of users) {
                html += `<div class="user-item">
                    <div><strong>${u.nickname}</strong> (${u.login})<br>💰 ${u.coins} 🎁 ${u.total_boxes}<br><span class="${u.is_banned ? 'status-banned' : 'status-active'}">${u.is_banned ? '⛔ Забанен' : '✅ Активен'}</span></div>
                    <div>${u.is_banned ? `<button onclick="unbanUser(${u.id})">Разбанить</button>` : (u.login !== 'unity' ? `<button onclick="banUser(${u.id}, '${u.nickname}')">Забанить</button>` : '👑')}</div>
                </div>`;
            }
            html += '</div>';
            document.getElementById('adminTable').innerHTML = html;
        }
        
        async function banUser(userId, nickname) {
            const reason = prompt(`Причина бана для ${nickname}:`, 'Нарушение');
            if (!reason) return;
            await fetch('/api/ban', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({userId, reason})
            });
            loadAdminTable();
        }
        
        async function unbanUser(userId) {
            await fetch('/api/unban', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({userId})
            });
            loadAdminTable();
        }
        
        document.getElementById('openBtn').onclick = () => {
            if (currentUserId) socket.emit('open_box');
        };
        
        socket.on('box_opened', (reward) => {
            document.getElementById('reward').innerHTML = `🎉 Выпало: ${reward.name}! 🎉`;
            updateStats();
            setTimeout(() => document.getElementById('reward').innerHTML = '', 2000);
        });
        
        socket.on('session_terminated', (data) => {
            alert(`⛔ СЕССИЯ ЗАВЕРШЕНА! ПЕРЕЗАГРУЗИТЕ ИГРУ ⛔\n\nПричина: ${data?.reason || 'Нарушение'}`);
            window.location.reload();
        });
        
        setInterval(updateStats, 5000);
    </script>
</body>
</html>
