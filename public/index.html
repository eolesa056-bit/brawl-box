<!DOCTYPE html>
<html>
<head>
    <title>Brawl Stars Box Simulator</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(ellipse at 20% 30%, #0f0c29, #1a1a3e, #0a0a1a);
            min-height: 100vh;
            padding: 20px;
        }

        /* Плавающая аватарка */
        .floating-avatar {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            cursor: pointer;
        }

        .mini-avatar {
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #2a2a5a, #1a1a3e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            border: 2px solid #e94560;
            transition: 0.2s;
        }

        /* Модальное окно профиля (увеличенное) */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }

        .profile-container {
            background: linear-gradient(145deg, #0f172a, #020617);
            width: 90%;
            max-width: 800px;
            border-radius: 60px;
            border: 1px solid #e94560;
            padding: 35px;
            position: relative;
            box-shadow: 0 0 50px rgba(233,69,96,0.3);
        }

        .close-profile {
            position: absolute;
            top: 20px;
            right: 25px;
            background: #e94560;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 22px;
            cursor: pointer;
        }

        /* Левая колонка: аватарка (поддерживает картинки) */
        .avatar-section {
            text-align: center;
        }

        .avatar-large {
            width: 140px;
            height: 140px;
            background: linear-gradient(135deg, #2a2a5a, #1a1a3e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 85px;
            border: 3px solid #e94560;
            cursor: pointer;
            transition: 0.2s;
            overflow: hidden;
        }

        .avatar-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-large:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px #e94560;
        }

        .player-tag-static {
            font-size: 13px;
            color: #aaa;
            background: rgba(0,0,0,0.5);
            padding: 5px 12px;
            border-radius: 30px;
            display: inline-block;
            margin-top: 12px;
        }

        /* Правая колонка (информация) */
        .info-section {
            flex: 1;
        }

        .nickname-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .profile-nickname {
            font-size: 42px;
            font-weight: bold;
            transition: 0.2s;
        }

        .profile-nickname:hover {
            text-shadow: 0 0 5px currentColor;
        }

        .edit-icon {
            font-size: 22px;
            opacity: 0.7;
        }

        .profile-cups {
            font-size: 26px;
            color: #f9a826;
            font-weight: bold;
        }

        /* Сетка статистики */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 30px;
            padding: 20px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 18px;
            color: #aaa;
            margin-bottom: 15px;
        }

        .stat-value {
            font-size: 34px;
            font-weight: bold;
            color: #f9a826;
        }

        /* Окна выбора */
        .avatar-modal, .nickname-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 300;
            justify-content: center;
            align-items: center;
        }

        .avatar-selector, .nickname-container {
            background: #0f172a;
            padding: 35px;
            border-radius: 60px;
            border: 1px solid #e94560;
            max-width: 600px;
            width: 90%;
            text-align: center;
        }

        .avatar-selector {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .avatar-option {
            width: 85px;
            height: 85px;
            background: #1a1a3e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 55px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
            overflow: hidden;
        }

        .avatar-option img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-option:hover {
            border-color: #e94560;
            transform: scale(1.05);
        }

        .nickname-container input {
            width: 100%;
            padding: 15px;
            border-radius: 50px;
            background: #1a1a3e;
            border: 1px solid #e94560;
            color: white;
            font-size: 18px;
            margin: 20px 0;
        }

        .color-options {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
        }

        .color-circle {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #fff;
        }

        .btn {
            background: linear-gradient(135deg, #e94560, #b91c3c);
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            margin: 10px 5px;
        }

        .hidden { display: none; }
        input, .btn { width: 100%; }
    </style>
</head>
<body>
    <div class="floating-avatar" onclick="openProfile()">
        <div class="mini-avatar" id="miniAvatar">🎮</div>
    </div>

    <!-- ОСНОВНОЙ ПРОФИЛЬ -->
    <div id="profileModal" class="modal">
        <div class="profile-container">
            <button class="close-profile" onclick="closeProfile()">✖</button>
            
            <div class="profile-header">
                <div class="avatar-section">
                    <div class="avatar-large" id="largeAvatar" onclick="openAvatarPicker()">🎮</div>
                    <div class="player-tag-static" id="profileTag">#----</div>
                </div>
                <div class="info-section">
                    <div class="nickname-wrapper" onclick="openNicknameEditor()">
                        <div class="profile-nickname" id="profileNick">-</div>
                        <div class="edit-icon">✏️</div>
                    </div>
                    <div class="profile-cups">🏆 <span id="profileCups">0</span> кубков</div>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card"><h3>🎲 ОТКРЫТО ЯЩИКОВ</h3><div class="stat-value" id="profileBoxes">0</div></div>
                <div class="stat-card"><h3>💰 МОНЕТЫ</h3><div class="stat-value" id="profileCoins">0</div></div>
                <div class="stat-card"><h3>🏆 КУБКОВ ВСЕГО</h3><div class="stat-value" id="profileTotalCups">0</div></div>
                <div class="stat-card"><h3>⭐ ЛУЧШИЙ РЕКОРД</h3><div class="stat-value" id="recordCups">0</div></div>
            </div>
        </div>
    </div>

    <!-- ОКНО ВЫБОРА АВАТАРКИ (добавлена эксклюзивная для разработчика) -->
    <div id="avatarPickerModal" class="avatar-modal">
        <div class="avatar-selector" id="avatarSelector">
            <div class="avatar-option" data-avatar="🎮">🎮</div>
            <div class="avatar-option" data-avatar="⭐">⭐</div>
            <div class="avatar-option" data-avatar="🔥">🔥</div>
            <div class="avatar-option" data-avatar="🐺">🐺</div>
            <div class="avatar-option" data-avatar="🤖">🤖</div>
            <div class="avatar-option" data-avatar="👑">👑</div>
            <div class="avatar-option" data-avatar="⚡">⚡</div>
            <div class="avatar-option" data-avatar="😈">😈</div>
            <!-- Эксклюзивная аватарка разработчика (только для админа unity) -->
            <div class="avatar-option" id="devAvatar" style="display:none;" data-avatar="url">👑 DEV</div>
        </div>
    </div>

    <!-- ОКНО РЕДАКТОРА НИКНЕЙМА И ЦВЕТА -->
    <div id="nicknameEditorModal" class="nickname-modal">
        <div class="nickname-container">
            <h3>✏️ СМЕНИТЬ НИКНЕЙМ</h3>
            <input type="text" id="newNicknameInput" placeholder="Новый никнейм">
            <h4>🎨 ЦВЕТ НИКА</h4>
            <div class="color-options">
                <div class="color-circle" style="background:#ffffff;" data-color="#ffffff"></div>
                <div class="color-circle" style="background:#f9a826;" data-color="#f9a826"></div>
                <div class="color-circle" style="background:#ff69b4;" data-color="#ff69b4"></div>
                <div class="color-circle" style="background:#00bfff;" data-color="#00bfff"></div>
                <div class="color-circle" style="background:#c084fc;" data-color="#c084fc"></div>
            </div>
            <button class="btn" onclick="changeNickname()">СОХРАНИТЬ</button>
            <button class="btn" onclick="closeNicknameEditor()" style="background:#2a2a5a;">ОТМЕНА</button>
        </div>
    </div>

    <!-- Вход -->
    <div id="authPanel" class="modal" style="display:flex; background:rgba(0,0,0,0.95);">
        <div class="profile-container" style="max-width:400px;">
            <h2>🔐 ВХОД</h2>
            <input type="text" id="nickname" placeholder="Никнейм">
            <div id="adminPasswordGroup" class="hidden">
                <input type="password" id="adminPassword" placeholder="Пароль админа">
            </div>
            <button class="btn" onclick="login()">ВОЙТИ</button>
            <div id="authMessage" style="color:#ff6b6b; margin-top:10px;"></div>
        </div>
    </div>

    <!-- Главное меню (пустое) -->
    <div id="gamePanel" class="hidden" style="max-width:700px; margin:120px auto 0; text-align:center;">
        <h1 style="font-size:48px; background:linear-gradient(135deg,#fff,#e94560); -webkit-background-clip:text; background-clip:text; color:transparent;">⚡ BRAWL BOX ⚡</h1>
        <div style="background:rgba(15,25,45,0.85); border-radius:40px; padding:50px; margin-top:25px;">
            <p style="color:#aaa; font-size:18px;">Здесь скоро появится игровой автомат</p>
        </div>
    </div>

    <script>
        let currentPlayerId = null;
        let selectedColor = "#ffffff";
        let isAdmin = false;
        const DEV_AVATAR_URL = "https://yt3.googleusercontent.com/wEnonoxntKdkIuHZbNouYlz6YoCchSbx7tpBRaVS6V08XzJYkvNZaG34RwZV7khnoF6hqI-kGw=s900-c-k-c0x00ffffff-no-rj";

        async function refreshProfileData() {
            if (!currentPlayerId) return;
            const res = await fetch('/api/player/' + currentPlayerId);
            const data = await res.json();
            if (!data.error) {
                const avatar = data.avatar || '🎮';
                // Если аватарка — ссылка (начинается с http), показываем картинку
                if (avatar.startsWith('http')) {
                    document.getElementById('miniAvatar').innerHTML = `<img src="${avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
                    document.getElementById('largeAvatar').innerHTML = `<img src="${avatar}" style="width:100%;height:100%;object-fit:cover;">`;
                } else {
                    document.getElementById('miniAvatar').innerText = avatar;
                    document.getElementById('largeAvatar').innerHTML = avatar;
                }
                document.getElementById('profileNick').innerText = data.nickname;
                document.getElementById('profileNick').style.color = data.nickname_color || '#ffffff';
                document.getElementById('profileTag').innerText = data.tag || '#----';
                document.getElementById('profileCups').innerText = data.cups || 0;
                document.getElementById('profileBoxes').innerText = data.total_boxes || 0;
                document.getElementById('profileCoins').innerText = data.coins || 0;
                document.getElementById('profileTotalCups').innerText = data.cups || 0;
                document.getElementById('recordCups').innerText = data.record_cups || data.cups || 0;
            }
        }

        async function changeAvatar(avatarValue, isUrl = false) {
            let finalAvatar = avatarValue;
            if (isUrl) finalAvatar = DEV_AVATAR_URL;
            await fetch('/api/change_avatar', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ playerId: currentPlayerId, avatar: finalAvatar }) 
            });
            await refreshProfileData();
            closeAvatarPicker();
        }

        async function changeNickname() {
            const newNick = document.getElementById('newNicknameInput').value.trim();
            if (!newNick) return alert("Введи никнейм");
            const res = await fetch('/api/change_nickname', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ playerId: currentPlayerId, newNickname: newNick, color: selectedColor }) 
            });
            const data = await res.json();
            if (data.success) { await refreshProfileData(); closeNicknameEditor(); }
            else alert(data.message || "Ошибка");
        }

        function openProfile() { refreshProfileData(); document.getElementById('profileModal').style.display = 'flex'; }
        function closeProfile() { document.getElementById('profileModal').style.display = 'none'; }
        function openAvatarPicker() { document.getElementById('avatarPickerModal').style.display = 'flex'; }
        function closeAvatarPicker() { document.getElementById('avatarPickerModal').style.display = 'none'; }
        function openNicknameEditor() { document.getElementById('nicknameEditorModal').style.display = 'flex'; }
        function closeNicknameEditor() { document.getElementById('nicknameEditorModal').style.display = 'none'; }

        async function login() {
            const nickname = document.getElementById('nickname').value.trim();
            if (!nickname) return;
            let password = '';
            if (nickname === 'unity') {
                password = document.getElementById('adminPassword').value;
                if (!password) return alert('Введи пароль админа');
            }
            const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ nickname, password }) });
            const data = await res.json();
            if (data.success) {
                currentPlayerId = data.player.id;
                isAdmin = data.player.is_admin === true;
                document.getElementById('authPanel').style.display = 'none';
                document.getElementById('gamePanel').classList.remove('hidden');
                await refreshProfileData();

                // Настройка выбора аватарок
                const avatarOptions = document.querySelectorAll('.avatar-option');
                avatarOptions.forEach(opt => {
                    const val = opt.getAttribute('data-avatar');
                    if (val === 'url') {
                        if (isAdmin) opt.style.display = 'flex';
                        else opt.style.display = 'none';
                        opt.onclick = () => changeAvatar('', true);
                    } else {
                        opt.onclick = () => changeAvatar(val, false);
                    }
                });

                document.querySelectorAll('.color-circle').forEach(circle => circle.onclick = () => { selectedColor = circle.getAttribute('data-color'); });
            } else document.getElementById('authMessage').innerText = data.message;
        }

        document.getElementById('nickname').addEventListener('input', e => document.getElementById('adminPasswordGroup').classList.toggle('hidden', e.target.value !== 'unity'));
        window.onclick = event => {
            if (event.target === document.getElementById('profileModal')) closeProfile();
            if (event.target === document.getElementById('avatarPickerModal')) closeAvatarPicker();
            if (event.target === document.getElementById('nicknameEditorModal')) closeNicknameEditor();
        };
    </script>
</body>
</html>
