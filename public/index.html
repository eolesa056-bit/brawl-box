<!DOCTYPE html>
<html>
<head>
    <title>Brawl Stars Box Simulator</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(ellipse at 20% 30%, #0f0c29, #1a1a3e, #0a0a1a);
            min-height: 100vh;
            padding: 20px;
        }

        /* Плавающая аватарка (с ником снизу) */
        .floating-avatar {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .mini-avatar {
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #2a2a5a, #1a1a3e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            border: 2px solid #e94560;
        }

        .nickname-overlay {
            font-size: 11px;
            font-weight: bold;
            background: rgba(0,0,0,0.7);
            padding: 3px 8px;
            border-radius: 30px;
            max-width: 85px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            text-align: center;
        }

        /* Модальное окно профиля (только профиль, без пути) */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }

        .profile-container {
            background: linear-gradient(145deg, #0f172a, #020617);
            width: 90%;
            max-width: 600px;
            border-radius: 60px;
            border: 1px solid #e94560;
            padding: 35px;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 25px;
            background: #e94560;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 22px;
            cursor: pointer;
        }

        .profile-header {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            margin-bottom: 30px;
            align-items: center;
        }

        .avatar-large {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #2a2a5a, #1a1a3e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 75px;
            border: 3px solid #e94560;
            cursor: pointer;
            overflow: hidden;
        }

        .player-tag-static {
            font-size: 12px;
            color: #aaa;
            background: rgba(0,0,0,0.5);
            padding: 4px 10px;
            border-radius: 30px;
            display: inline-block;
            margin-top: 10px;
        }

        .info-section {
            flex: 1;
        }

        .nickname-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }

        .profile-nickname {
            font-size: 34px;
            font-weight: bold;
        }

        .edit-icon, .color-icon {
            font-size: 18px;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            padding: 4px 10px;
            border-radius: 30px;
        }

        .profile-cups {
            font-size: 22px;
            color: #f9a826;
            font-weight: bold;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 25px;
            padding: 15px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 26px;
            font-weight: bold;
            color: #f9a826;
        }

        /* ========== ОТДЕЛЬНОЕ ОКНО ПУТИ К СЛАВЕ ========== */
        .path-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }

        .path-container {
            background: linear-gradient(145deg, #0f172a, #020617);
            width: 90%;
            max-width: 800px;
            border-radius: 60px;
            border: 1px solid #e94560;
            padding: 35px;
            position: relative;
        }

        .path-title {
            text-align: center;
            margin-bottom: 25px;
            font-size: 28px;
            color: #e94560;
        }

        .path-track {
            background: rgba(0,0,0,0.5);
            border-radius: 40px;
            padding: 20px;
        }

        .path-scroll {
            display: flex;
            overflow-x: auto;
            gap: 20px;
            padding: 10px 5px;
            scroll-behavior: smooth;
            cursor: grab;
        }

        .path-scroll:active {
            cursor: grabbing;
        }

        .path-step {
            flex: 0 0 130px;
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-radius: 30px;
            padding: 15px;
            text-align: center;
            border: 1px solid #2a2a5a;
        }

        .path-step.completed {
            border-color: #f9a826;
            background: linear-gradient(145deg, #2a2a5a, #1e293b);
        }

        .path-step.locked {
            opacity: 0.6;
        }

        .step-cups {
            font-size: 18px;
            font-weight: bold;
            color: #f9a826;
        }

        .step-reward {
            font-size: 24px;
            margin: 8px 0;
        }

        .step-status {
            font-size: 18px;
        }

        .claim-btn {
            background: #e94560;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 8px;
        }

        .scroll-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .scroll-btn {
            background: #e94560;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 22px;
            cursor: pointer;
        }

        /* Остальные окна */
        .avatar-modal, .nickname-modal, .color-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 300;
            justify-content: center;
            align-items: center;
        }

        .avatar-selector, .nickname-container, .color-container {
            background: #0f172a;
            padding: 35px;
            border-radius: 60px;
            border: 1px solid #e94560;
            max-width: 600px;
            width: 90%;
            text-align: center;
        }

        .avatar-selector {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .avatar-option {
            width: 85px;
            height: 85px;
            background: #1a1a3e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 55px;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .color-options {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .color-circle {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid #fff;
        }

        .btn {
            background: linear-gradient(135deg, #e94560, #b91c3c);
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
        }

        .hidden { display: none; }
        input, .btn { width: 100%; }

        .main-menu-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }

        .main-menu-buttons button {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border: 1px solid #e94560;
            padding: 12px 30px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <!-- ПЛАВАЮЩАЯ АВАТАРКА -->
    <div class="floating-avatar" onclick="openProfileModal()">
        <div class="mini-avatar" id="miniAvatar">🎮</div>
        <div class="nickname-overlay" id="miniNickname">-</div>
    </div>

    <!-- ОКНО ПРОФИЛЯ -->
    <div id="profileModal" class="modal">
        <div class="profile-container">
            <button class="close-modal" onclick="closeProfileModal()">✖</button>
            <div class="profile-header">
                <div class="avatar-section">
                    <div class="avatar-large" id="largeAvatar" onclick="openAvatarPicker()">🎮</div>
                    <div class="player-tag-static" id="profileTag">#----</div>
                </div>
                <div class="info-section">
                    <div class="nickname-wrapper">
                        <div class="profile-nickname" id="profileNick">-</div>
                        <div class="edit-icon" onclick="openNicknameEditor()">✏️</div>
                        <div class="color-icon" onclick="openColorPicker()">🎨</div>
                    </div>
                    <div class="profile-cups">🏆 <span id="profileCups">0</span> кубков</div>
                </div>
            </div>
            <div class="stats-grid">
                <div class="stat-card"><h3>🎲 ОТКРЫТО ЯЩИКОВ</h3><div class="stat-value" id="profileBoxes">0</div></div>
                <div class="stat-card"><h3>💰 МОНЕТЫ</h3><div class="stat-value" id="profileCoins">0</div></div>
                <div class="stat-card"><h3>🏆 КУБКОВ ВСЕГО</h3><div class="stat-value" id="profileTotalCups">0</div></div>
                <div class="stat-card"><h3>⭐ ЛУЧШИЙ РЕКОРД</h3><div class="stat-value" id="recordCups">0</div></div>
            </div>
        </div>
    </div>

    <!-- ОКНО ПУТИ К СЛАВЕ -->
    <div id="pathModal" class="path-modal">
        <div class="path-container">
            <button class="close-modal" onclick="closePathModal()">✖</button>
            <div class="path-title">🏆 ПУТЬ К СЛАВЕ 🏆</div>
            <div class="path-track">
                <div class="path-scroll" id="pathScroll"></div>
                <div class="scroll-buttons">
                    <button class="scroll-btn" onclick="scrollPath(-150)">◀</button>
                    <button class="scroll-btn" onclick="scrollPath(150)">▶</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ОКНА ВЫБОРА -->
    <div id="avatarPickerModal" class="avatar-modal">
        <div class="avatar-selector" id="avatarSelector">
            <div class="avatar-option" data-avatar="🎮">🎮</div>
            <div class="avatar-option" data-avatar="⭐">⭐</div>
            <div class="avatar-option" data-avatar="🔥">🔥</div>
            <div class="avatar-option" data-avatar="🐺">🐺</div>
            <div class="avatar-option" data-avatar="🤖">🤖</div>
            <div class="avatar-option" data-avatar="👑">👑</div>
            <div class="avatar-option" data-avatar="⚡">⚡</div>
            <div class="avatar-option" data-avatar="😈">😈</div>
            <div class="avatar-option" id="devAvatar" style="display:none;" data-avatar="url">👑 DEV</div>
        </div>
    </div>

    <div id="nicknameEditorModal" class="nickname-modal">
        <div class="nickname-container">
            <h3>✏️ СМЕНИТЬ НИКНЕЙМ</h3>
            <input type="text" id="newNicknameInput" placeholder="Новый никнейм">
            <button class="btn" onclick="changeNickname()">СОХРАНИТЬ</button>
            <button class="btn" onclick="closeNicknameEditor()" style="background:#2a2a5a;">ОТМЕНА</button>
        </div>
    </div>

    <div id="colorPickerModal" class="color-modal">
        <div class="color-container">
            <h3>🎨 ВЫБЕРИ ЦВЕТ НИКНЕЙМА</h3>
            <div class="color-options" id="colorOptions">
                <div class="color-circle" style="background:#ffffff;" data-color="#ffffff"></div>
                <div class="color-circle" style="background:#f9a826;" data-color="#f9a826"></div>
                <div class="color-circle" style="background:#ff69b4;" data-color="#ff69b4"></div>
                <div class="color-circle" style="background:#00bfff;" data-color="#00bfff"></div>
                <div class="color-circle" style="background:#c084fc;" data-color="#c084fc"></div>
                <div class="color-circle" style="background:#ff0000;" data-color="#ff0000"></div>
                <div class="color-circle" style="background:#00ff88;" data-color="#00ff88"></div>
            </div>
        </div>
    </div>

    <!-- ВХОД -->
    <div id="authPanel" class="modal" style="display:flex; background:rgba(0,0,0,0.95);">
        <div class="profile-container" style="max-width:400px;">
            <h2>🔐 ВХОД</h2>
            <input type="text" id="nickname" placeholder="Никнейм">
            <div id="adminPasswordGroup" class="hidden">
                <input type="password" id="adminPassword" placeholder="Пароль админа">
            </div>
            <button class="btn" onclick="login()">ВОЙТИ</button>
            <div id="authMessage" style="color:#ff6b6b; margin-top:10px;"></div>
        </div>
    </div>

    <!-- ГЛАВНОЕ МЕНЮ -->
    <div id="gamePanel" class="hidden" style="max-width:700px; margin:120px auto 0; text-align:center;">
        <h1 style="font-size:48px; background:linear-gradient(135deg,#fff,#e94560); -webkit-background-clip:text; background-clip:text; color:transparent;">⚡ BRAWL BOX ⚡</h1>
        <div class="main-menu-buttons">
            <button onclick="openPathModal()">🏆 ПУТЬ К СЛАВЕ</button>
            <button onclick="openProfileModal()">👤 ПРОФИЛЬ</button>
        </div>
        <div style="background:rgba(15,25,45,0.85); border-radius:40px; padding:50px; margin-top:25px;">
            <p style="color:#aaa; font-size:18px;">Здесь скоро появится игровой автомат</p>
        </div>
    </div>

    <script>
        let currentPlayerId = null;
        let isAdmin = false;
        let pathData = [
            { cups: 100, reward: "50💰", claimed: false },
            { cups: 250, reward: "100💰", claimed: false },
            { cups: 500, reward: "🎁 Обычный ящик", claimed: false },
            { cups: 1000, reward: "200💰", claimed: false },
            { cups: 2000, reward: "🎁 Редкий ящик", claimed: false },
            { cups: 3500, reward: "500💰", claimed: false },
            { cups: 5000, reward: "🔥 Легендарный скин", claimed: false },
            { cups: 7500, reward: "1000💰", claimed: false },
            { cups: 10000, reward: "👑 Эксклюзивный боец", claimed: false },
            { cups: 15000, reward: "2000💰", claimed: false },
            { cups: 20000, reward: "⭐ Мега-ящик", claimed: false },
            { cups: 30000, reward: "5000💰", claimed: false },
            { cups: 50000, reward: "💎 Алмазный скин", claimed: false },
            { cups: 75000, reward: "10000💰", claimed: false },
            { cups: 100000, reward: "🏆 ЗОЛОТОЙ ТРОФЕЙ 🏆", claimed: false }
        ];
        const DEV_AVATAR_URL = "https://yt3.googleusercontent.com/wEnonoxntKdkIuHZbNouYlz6YoCchSbx7tpBRaVS6V08XzJYkvNZaG34RwZV7khnoF6hqI-kGw=s900-c-k-c0x00ffffff-no-rj";

        async function refreshProfileData() {
            if (!currentPlayerId) return;
            const res = await fetch('/api/player/' + currentPlayerId);
            const data = await res.json();
            if (!data.error) {
                const avatar = data.avatar || '🎮';
                const nickname = data.nickname;
                const nicknameColor = data.nickname_color || '#ffffff';
                const currentCups = data.cups || 0;
                document.getElementById('miniNickname').innerText = nickname.length > 10 ? nickname.slice(0, 9) + '…' : nickname;
                document.getElementById('miniNickname').style.color = nicknameColor;
                if (avatar.startsWith('http')) {
                    document.getElementById('miniAvatar').innerHTML = `<img src="${avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
                    document.getElementById('largeAvatar').innerHTML = `<img src="${avatar}" style="width:100%;height:100%;object-fit:cover;">`;
                } else {
                    document.getElementById('miniAvatar').innerText = avatar;
                    document.getElementById('largeAvatar').innerHTML = avatar;
                }
                document.getElementById('profileNick').innerText = nickname;
                document.getElementById('profileNick').style.color = nicknameColor;
                document.getElementById('profileTag').innerText = data.tag || '#----';
                document.getElementById('profileCups').innerText = currentCups;
                document.getElementById('profileTotalCups').innerText = currentCups;
                document.getElementById('recordCups').innerText = data.record_cups || currentCups;
                document.getElementById('profileBoxes').innerText = data.total_boxes || 0;
                document.getElementById('profileCoins').innerText = data.coins || 0;

                const savedPath = data.path_data ? JSON.parse(data.path_data) : null;
                if (savedPath) pathData = savedPath;
                renderPath(currentCups);
            }
        }

        function renderPath(currentCups) {
            const container = document.getElementById('pathScroll');
            if (!container) return;
            container.innerHTML = '';
            pathData.forEach((step, idx) => {
                const isCompleted = currentCups >= step.cups;
                const isClaimed = step.claimed;
                const div = document.createElement('div');
                div.className = `path-step ${isCompleted ? 'completed' : 'locked'}`;
                div.innerHTML = `
                    <div class="step-cups">${step.cups}🏆</div>
                    <div class="step-reward">${step.reward}</div>
                    <div class="step-status">${isClaimed ? '✓ ПОЛУЧЕНО' : (isCompleted ? '<button class="claim-btn" data-idx="'+idx+'">ЗАБРАТЬ</button>' : '🔒')}</div>
                `;
                container.appendChild(div);
            });
            document.querySelectorAll('.claim-btn').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    const idx = parseInt(btn.getAttribute('data-idx'));
                    claimReward(idx, currentCups);
                };
            });
        }

        async function claimReward(idx, currentCups) {
            const step = pathData[idx];
            if (currentCups < step.cups || step.claimed) return;
            step.claimed = true;
            let rewardText = step.reward;
            let coinsGain = 0;
            if (rewardText.includes('💰')) {
                coinsGain = parseInt(rewardText) || 50;
                await fetch('/api/add_coins', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ playerId: currentPlayerId, coins: coinsGain }) });
            } else if (rewardText.includes('ящик')) {
                await fetch('/api/add_box', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ playerId: currentPlayerId }) });
            } else if (rewardText.includes('скин')) {
                await fetch('/api/add_skin', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ playerId: currentPlayerId }) });
            }
            await fetch('/api/save_path', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ playerId: currentPlayerId, pathData: pathData }) });
            await refreshProfileData();
            renderPath(currentCups);
        }

        function scrollPath(delta) {
            const container = document.getElementById('pathScroll');
            if (container) container.scrollBy({ left: delta, behavior: 'smooth' });
        }

        async function changeAvatar(avatarValue, isUrl = false) {
            await fetch('/api/change_avatar', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ playerId: currentPlayerId, avatar: isUrl ? DEV_AVATAR_URL : avatarValue }) });
            await refreshProfileData();
            closeAvatarPicker();
        }

        async function changeNickname() {
            const newNick = document.getElementById('newNicknameInput').value.trim();
            if (!newNick) return alert("Введи никнейм");
            const res = await fetch('/api/change_nickname', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ playerId: currentPlayerId, newNickname: newNick, color: null }) });
            const data = await res.json();
            if (data.success) { await refreshProfileData(); closeNicknameEditor(); }
            else alert(data.message || "Ошибка");
        }

        async function changeColorOnly(color) {
            await fetch('/api/change_nickname', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ playerId: currentPlayerId, color: color }) });
            await refreshProfileData();
        }

        function openProfileModal() { refreshProfileData(); document.getElementById('profileModal').style.display = 'flex'; }
        function closeProfileModal() { document.getElementById('profileModal').style.display = 'none'; }
        function openPathModal() { refreshProfileData(); document.getElementById('pathModal').style.display = 'flex'; }
        function closePathModal() { document.getElementById('pathModal').style.display = 'none'; }
        function openAvatarPicker() { document.getElementById('avatarPickerModal').style.display = 'flex'; }
        function closeAvatarPicker() { document.getElementById('avatarPickerModal').style.display = 'none'; }
        function openNicknameEditor() { document.getElementById('nicknameEditorModal').style.display = 'flex'; }
        function closeNicknameEditor() { document.getElementById('nicknameEditorModal').style.display = 'none'; }
        function openColorPicker() { document.getElementById('colorPickerModal').style.display = 'flex'; }
        function closeColorPicker() { document.getElementById('colorPickerModal').style.display = 'none'; }

        async function login() {
            const nickname = document.getElementById('nickname').value.trim();
            if (!nickname) return;
            let password = '';
            if (nickname === 'unity') {
                password = document.getElementById('adminPassword').value;
                if (!password) return alert('Введи пароль админа');
            }
            const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ nickname, password }) });
            const data = await res.json();
            if (data.success) {
                currentPlayerId = data.player.id;
                isAdmin = data.player.is_admin === true;
                document.getElementById('authPanel').style.display = 'none';
                document.getElementById('gamePanel').classList.remove('hidden');
                await refreshProfileData();
                document.querySelectorAll('.avatar-option').forEach(opt => {
                    const val = opt.getAttribute('data-avatar');
                    if (val === 'url') {
                        if (isAdmin) opt.style.display = 'flex';
                        else opt.style.display = 'none';
                        opt.onclick = () => changeAvatar('', true);
                    } else {
                        opt.onclick = () => changeAvatar(val, false);
                    }
                });
                document.querySelectorAll('.color-circle').forEach(circle => {
                    const color = circle.getAttribute('data-color');
                    circle.onclick = async () => {
                        await changeColorOnly(color);
                        closeColorPicker();
                        openProfileModal();
                    };
                });
            } else document.getElementById('authMessage').innerText = data.message;
        }

        document.getElementById('nickname').addEventListener('input', e => document.getElementById('adminPasswordGroup').classList.toggle('hidden', e.target.value !== 'unity'));
        window.onclick = event => {
            if (event.target === document.getElementById('profileModal')) closeProfileModal();
            if (event.target === document.getElementById('pathModal')) closePathModal();
            if (event.target === document.getElementById('avatarPickerModal')) closeAvatarPicker();
            if (event.target === document.getElementById('nicknameEditorModal')) closeNicknameEditor();
            if (event.target === document.getElementById('colorPickerModal')) closeColorPicker();
        };
    </script>
</body>
</html>
