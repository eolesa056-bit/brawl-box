<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админ-панель | Brawl Box</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            padding: 20px;
        }
        table {
            width: 100%;
            background: #16213e;
            border-radius: 10px;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            border-bottom: 1px solid #0f3460;
            text-align: left;
        }
        th {
            background: #0f3460;
        }
        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 6px 12px;
            margin: 3px;
            border-radius: 5px;
            cursor: pointer;
        }
        button.unban {
            background: #00ff88;
            color: black;
        }
        .banned {
            color: #ff6b8b;
        }
    </style>
</head>
<body>
    <h1>👑 Админ-панель</h1>
    <button onclick="loadPlayers()">🔄 Обновить</button>
    <div style="overflow-x: auto;">
        <table id="playersTable">
            <thead><tr><th>Тег</th><th>Ник</th><th>Монет</th><th>Ящиков</th><th>Статус</th><th>Действия</th></tr></thead>
            <tbody id="playersList"><tr><td colspan="6">Загрузка...<\/td><\/tr><\/tbody>
        <\/table>
    <\/div>
    <script>
        async function loadPlayers() {
            const res = await fetch('/api/players');
            const players = await res.json();
            const tbody = document.getElementById('playersList');
            tbody.innerHTML = '';
            for (const p of players) {
                const row = tbody.insertRow();
                row.insertCell(0).innerHTML = `<strong>${p.visible_tag}<\/strong>`;
                row.insertCell(1).innerText = p.nickname;
                row.insertCell(2).innerText = p.coins;
                row.insertCell(3).innerText = p.total_boxes;
                row.insertCell(4).innerHTML = p.is_banned ? '<span class="banned">⛔ Забанен<\/span>' : '✅ Активен';
                const actions = row.insertCell(5);
                if (p.is_banned) {
                    const btn = document.createElement('button');
                    btn.innerText = 'Разбанить';
                    btn.className = 'unban';
                    btn.onclick = () => fetch('/api/unban', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({playerId: p.secret_id}) }).then(() => loadPlayers());
                    actions.appendChild(btn);
                } else {
                    const btn = document.createElement('button');
                    btn.innerText = 'Забанить';
                    btn.onclick = () => {
                        const reason = prompt('Причина:');
                        if(reason) {
                            const hours = prompt('Часы (0=навсегда):');
                            fetch('/api/ban', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({playerId: p.secret_id, reason, hours: parseInt(hours)||0}) }).then(() => loadPlayers());
                        }
                    };
                    actions.appendChild(btn);
                }
            }
        }
        loadPlayers();
        setInterval(loadPlayers, 10000);
    <\/script>
<\/body>
<\/html>
